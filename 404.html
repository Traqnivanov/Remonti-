<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="robots" content="noindex, follow"/>
  <title>Страницата не е намерена | Ivanov Remonti</title>
  <link rel="icon" type="image/png" href="https://traqnivanov.github.io/Remonti-/favicon.png"/>
  <style>
    :root { --navy:#0d1b2e; --navy2:#0a1422; --gold:#c9943a; --gold2:#e0b563; --text:#fff; --muted:rgba(255,255,255,.6); }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI', system-ui, -apple-system, sans-serif; background:linear-gradient(160deg,var(--navy),var(--navy2)); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem; text-align:center; }
    .wrap { max-width:520px; }
    .code { font-size:6rem; font-weight:800; background:linear-gradient(135deg,var(--gold),var(--gold2)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; line-height:1; margin-bottom:.5rem; }
    h1 { font-size:1.5rem; margin-bottom:1rem; font-weight:700; }
    p { color:var(--muted); line-height:1.7; margin-bottom:2rem; font-size:1rem; }
    .btns { display:flex; flex-direction:column; gap:.8rem; }
    a.btn { display:inline-flex; align-items:center; justify-content:center; gap:.5rem; padding:.9rem 1.6rem; border-radius:30px; text-decoration:none; font-weight:700; font-size:.95rem; transition:transform .2s; }
    a.btn:hover { transform:translateY(-2px); }
    .btn-gold { background:linear-gradient(135deg,var(--gold),var(--gold2)); color:var(--navy); }
    .btn-out { border:1px solid rgba(201,148,58,.4); color:var(--gold2); }
    .logo { font-size:.85rem; letter-spacing:.15em; color:var(--gold); margin-bottom:2.5rem; font-weight:700; text-transform:uppercase; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">Ivanov Remonti</div>
    <div class="code">404</div>
    <h1>Тази страница я няма</h1>
    <p>Изглежда, че адресът е сгрешен или страницата е преместена. Но ремонтът ви не е изгубен — върнете се в началото или се обадете директно.</p>
    <div class="btns">
      <a class="btn btn-gold" href="https://ivanov-remonti.com/">← Към началната страница</a>
      <a class="btn btn-out" href="tel:+359877810418">📞 Обадете се: 0877 810 418</a>
    </div>
  </div>
</body>
</html>
