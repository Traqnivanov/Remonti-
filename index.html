    body { font-family: 'Jost', sans-serif; background: var(--cream); color: var(--text); overflow-x: hidden; font-size: 1rem; line-height: 1.6; }

    .btn-viber { background-color: #7360f2; color: white; }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(201,148,58,0.7); } 70% { box-shadow: 0 0 0 15px rgba(201,148,58,0); } }

    /* STICKY MOBILE CTA */
    .sticky-cta { position: fixed; bottom: 0; left: 0; right: 0; z-index: 90; background: linear-gradient(135deg, var(--gold), var(--gold2)); padding: 1rem 2rem; text-align: center; display: none; }
    .sticky-cta a { color: var(--navy); font-weight: 700; text-decoration: none; font-size: 1rem; letter-spacing: .06em; text-transform: uppercase; }
    @media (max-width: 700px) { .sticky-cta { display: block; } }

    /* NAV */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 1rem 3rem; background: rgba(13,27,46,.97); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(201,148,58,.2); font-size: 1rem; }
    .logo { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; color: var(--gold); letter-spacing: .06em; line-height: 1.2; }

    .nav-links { display: flex; gap: 2rem; list-style: none; align-items: center; font-size: 1rem; }
    .nav-links a { color: #c8d6e8; text-decoration: none; font-size: .85rem; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; transition: color .2s; }
    .nav-links a:hover { color: var(--gold); }
    .nav-phone { background: linear-gradient(135deg, var(--gold), var(--gold2)); color: var(--navy) !important; padding: .55rem 1.3rem; border-radius: 3px; font-weight: 700 !important; white-space: nowrap; }

    /* HERO */
    .hero { min-height: 100vh; background: linear-gradient(160deg, #060d18 0%, var(--navy) 55%, #1a2f50 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 8rem 3rem 5rem; position: relative; overflow: hidden; text-align: center; }
    .hero h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(3.2rem, 7vw, 6.2rem); line-height: 1.05; color: var(--white); margin-bottom: 1rem; font-weight: 700; }
    .hero h1 .accent { color: var(--gold); display: block; }
    .hero-tagline { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: clamp(1.2rem, 2vw, 1.6rem); color: #a0b4cc; margin-bottom: 1rem; }
    .hero-sub { font-size: 1rem; color: #7a90a8; font-weight: 300; max-width: 650px; line-height: 1.95; margin: 0 auto 1rem; }
    .hero-sub strong { color: #c8d6e8; font-weight: 500; }
    .hero-btns { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; margin-bottom: 3rem; }
    .btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold2)); color: var(--navy); padding: 1rem 2.8rem; border-radius: 3px; text-decoration: none; font-weight: 700; font-size: 1rem; letter-spacing: .07em; text-transform: uppercase; transition: transform .2s, box-shadow .2s; box-shadow: 0 4px 26px rgba(201,148,58,.4); border: none; cursor: pointer; font-family: 'Jost', sans-serif; }
    .btn-gold:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(201,148,58,.6); }
    .btn-outline { border: 1px solid rgba(201,148,58,.45); color: var(--gold2); padding: 1rem 2.8rem; border-radius: 3px; text-decoration: none; font-weight: 500; font-size: .95rem; letter-spacing: .07em; text-transform: uppercase; transition: border-color .2s, background .2s; }
    .btn-outline:hover { border-color: var(--gold); background: rgba(201,148,58,.08); }

    /* SERVICES */

    /* GALLERY */

    .gallery-item { height: 260px; border: 1px solid rgba(255,255,255,.08); overflow: hidden; border-radius: 6px; }
    .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: transform .5s; }
    .gallery-item:hover img { transform: scale(1.1); }

    /* REVIEWS */

    /* RESPONSIVE */
