<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Екипът - Ремонти</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{--gold:#C9A84C;--gold-light:#E4C97E;--gold-dark:#9A7530;--green:#4CAF82;--red:#E05555;--radius:18px;}
  body{ --bg-page:#0a0a0b; --bg-widget:#1A1A1C; --bg-header-from:#0F0E0C; --bg-header-mid:#1C1A12; --bg-header-to:#221F0E; --bg-panel:#1C1C1E; --bg-msgs:#1A1A1C; --bg-bubble-bot:#1E1E20; --bg-input-row:#0E0E0F; --bg-btn:#252527; --border-widget:rgba(201,168,76,0.18); --border-bubble:rgba(255,255,255,0.06); --border-input:rgba(201,168,76,0.2); --border-panel:rgba(201,168,76,0.12); --text:#F0EDE6; --text2:#C8C4BC; --muted:#888880; --scroll-thumb:#303033; --shadow:0 28px 80px rgba(0,0,0,0.65); font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg-page);min-height:100vh;}
  body.light{ --bg-page:#F0EDE6; --bg-widget:#FFFFFF; --bg-header-from:#2C2A22; --bg-header-mid:#3A3520; --bg-header-to:#2C2A22; --bg-panel:#FFF8EC; --bg-msgs:#F5F2EB; --bg-bubble-bot:#FFFFFF; --bg-input-row:#FAF8F3; --bg-btn:#F0EDE6; --border-widget:rgba(201,168,76,0.35); --border-bubble:rgba(0,0,0,0.07); --border-input:rgba(201,168,76,0.4); --border-panel:rgba(201,168,76,0.2); --text:#1A1810; --text2:#3A3628; --muted:#7A7060; --scroll-thumb:#D8D0C0; --shadow:0 28px 80px rgba(0,0,0,0.18);}

  .c-btn, .cb-item, .act-btn, .cb-confirm, .cb-skip { font-size: 15px !important; padding: 13px 14px !important; }
  .c-num { width: 30px; height: 30px; font-size: 14px !important; }
  .tb-header button, .hdr-btn { min-width: 44px; min-height: 44px; }
  #tb-input { font-size: 16px; padding: 13px; }
  #tb-send { width: 52px; height: 52px; }
  .bubble { font-size: 16px; }
  .c-desc { font-size: 13px !important; }
  .c-label { font-size: 15px !important; }

  #tb-toggle{position:fixed;bottom:28px;right:28px;width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 32px rgba(201,168,76,0.5);z-index:9999;transition:transform .25s, opacity .25s;}
  #tb-toggle:hover{transform:scale(1.1);}
  #tb-toggle.open{opacity:0;pointer-events:none;}
  #tb-badge{position:absolute;top:-4px;right:-4px;width:24px;height:24px;border-radius:50%;background:var(--red);color:#fff;font-size:12px;font-weight:bold;display:none;align-items:center;justify-content:center;}
  #tb-badge.show{display:flex;}

  #tb-widget{position:fixed;bottom:106px;right:28px;width:450px;max-width:calc(100vw - 32px);height:700px;max-height:calc(100vh - 120px);background:var(--bg-widget);border-radius:var(--radius);box-shadow:var(--shadow),0 0 30px rgba(201,168,76,0.08);border:1px solid var(--border-widget);display:flex;flex-direction:column;overflow:hidden;z-index:9998;transform-origin:bottom right;transform:scale(0.85) translateY(20px);opacity:0;pointer-events:none;transition:transform .32s,opacity .26s;}
  #tb-widget.open{transform:scale(1) translateY(0);opacity:1;pointer-events:all;}
  #tb-panel { display: none !important; }

  @media (min-width: 601px) {
    .bubble { font-size: 17px !important; line-height: 1.6 !important; }
    .c-btn, .cb-item, .cb-confirm, .cb-skip { font-size: 17px !important; padding: 14px 16px !important; }
    .c-label { font-size: 17px !important; }
    .c-desc { font-size: 14px !important; }
    #tb-input { font-size: 17px !important; padding: 14px !important; }
    .pkg-card-name { font-size:17px !important; }
    .pkg-card-item { font-size:15px !important; }
    .pkg-card-btn { font-size:15px !important; padding:11px !important; }
    .pkg-card { padding:16px !important; }
  }
  @media (min-width: 601px) {
    #tb-widget.open { width: 100vw !important; height: 100vh !important; max-width: 100vw !important; max-height: 100vh !important; top: 0 !important; left: 0 !important; right: 0 !important; bottom: 0 !important; border-radius: 0 !important; transform: none !important; }
    .widget-body { display: flex !important; flex-direction: row !important; }
    #tb-sidebar { display: none !important; }
    #tb-bottom-bar { display: block !important; }
  }
  @media (max-width: 600px) {
    #tb-widget { position: fixed !important; right:0;bottom:0;left:0;top:0; width:100% !important; height:100% !important; border-radius:0; transform-origin:center center; }
    #tb-toggle{right:16px;bottom:16px;}
    #tb-sidebar { display: none !important; }
    #tb-bottom-bar { display: block !important; }
    .tb-msgs { flex: 1; min-height: 0; }
    .bubble { font-size: 15px !important; }
    .c-btn { font-size: 15px !important; }
    #tb-input { font-size: 16px !important; }
  }

  .widget-body{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  #tb-sidebar{display:none;width:260px;flex-shrink:0;background:var(--bg-panel);border-right:1px solid var(--border-panel);flex-direction:column;padding:14px;gap:8px;overflow-y:auto;}
  .sb-title{font-size:11px;font-weight:700;color:var(--gold);margin-bottom:6px;}
  .sb-item{background:var(--bg-btn);border:1px solid var(--border-bubble);border-radius:8px;padding:7px 10px;display:flex;flex-direction:column;gap:2px;position:relative;}
  .sb-item-name{font-size:13px;color:var(--text);line-height:1.3;word-break:break-word;}
  .sb-item-price{font-size:13px;font-weight:700;color:var(--gold);}
  .sb-remove{position:absolute;top:4px;right:6px;background:none;border:none;color:rgba(224,85,85,0.5);cursor:pointer;font-size:14px;line-height:1;}
  .sb-total{border-top:1px solid var(--border-panel);padding-top:8px;margin-top:4px;}
  .sb-total-lbl{font-size:10px;color:var(--muted);}
  .sb-total-val{font-size:15px;font-weight:700;color:var(--gold);}
  .sb-offer-btn{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#0E0E0F;border:none;border-radius:8px;padding:9px;font-size:12px;font-weight:700;cursor:pointer;width:100%;margin-top:6px;}
  .sb-other-btn{background:transparent;color:var(--muted);border:1px solid var(--border-bubble);border-radius:8px;padding:7px;font-size:11px;cursor:pointer;width:100%;margin-top:4px;}
  .sb-empty{font-size:11px;color:var(--muted);text-align:center;line-height:1.5;margin-top:8px;}

  #tb-bottom-bar{display:none;background:var(--bg-panel);border-top:1px solid rgba(201,168,76,0.25);padding:6px 12px;padding-bottom: max(6px, env(safe-area-inset-bottom));flex-shrink:0;}

  /* ── START GRID ── */
  .sg-wrap{width:100%;}
  .sg-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  @media(max-width:600px){.sg-grid{grid-template-columns:1fr;}}
  .sg-card{background:rgba(255,255,255,0.03);border:1px solid rgba(201,168,76,0.12);border-radius:14px;padding:14px 15px;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);opacity:0;transform:translateY(10px);display:flex;align-items:center;gap:12px;}
  .sg-card.sg-in{opacity:1;transform:translateY(0);}
  .sg-card:hover{border-color:rgba(201,168,76,0.35);background:rgba(201,168,76,0.04);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.3);}
  .sg-card:active{transform:scale(0.97);transition:transform .1s;}
  .c-btn:active{transform:scale(0.97);transition:transform .1s;}
  .cb-confirm:active,.cb-skip:active{transform:scale(0.97);transition:transform .1s;}
  .sg-card:hover .sg-icon{transform:scale(1.06);border-color:rgba(201,168,76,0.35);}
  .sg-icon{width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,0.04);border:1px solid rgba(201,168,76,0.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .3s;}
  .sg-icon svg{width:20px;height:20px;stroke:var(--gold);stroke-width:1.6;fill:none;}
  .sg-body{flex:1;min-width:0;}
  .sg-badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;margin-bottom:5px;letter-spacing:0.3px;}
  .sg-badge-red{background:rgba(224,85,85,0.12);color:#E07070;border:1px solid rgba(224,85,85,0.18);}
  .sg-badge-gold{background:rgba(201,168,76,0.1);color:var(--gold);border:1px solid rgba(201,168,76,0.2);}
  .sg-badge-green{background:rgba(76,175,130,0.1);color:#4CAF82;border:1px solid rgba(76,175,130,0.2);}
  .sg-badge-purple{background:rgba(155,142,245,0.1);color:#9B8EF5;border:1px solid rgba(155,142,245,0.2);}
  .sg-badge-blue{background:rgba(96,165,250,0.1);color:#60A5FA;border:1px solid rgba(96,165,250,0.2);}
  .sg-name{font-size:15px;font-weight:700;color:var(--text);line-height:1.2;}
  .sg-line{height:1.5px;background:#C9A84C;border-radius:2px;flex-shrink:0;animation:sgLine 2.5s ease-in-out infinite;}
  @keyframes cartPulse{0%{transform:scale(1);}30%{transform:scale(1.02);}60%{transform:scale(0.99);}100%{transform:scale(1);}}
  .cart-pulse{animation:cartPulse 0.5s ease-out;}
  @keyframes sgLine{0%,100%{width:0px;opacity:0;}35%,65%{width:12px;opacity:1;}}
  @keyframes sgNameShimmer{0%{background-position:200% center;}100%{background-position:-200% center;}}
  @keyframes glowGold{0%,100%{border-color:rgba(201,168,76,0.2);}50%{border-color:rgba(201,168,76,0.65);}}
  @keyframes glowRed{0%,100%{border-color:rgba(224,85,85,0.18);}50%{border-color:rgba(224,85,85,0.55);}}
  @keyframes glowGreen{0%,100%{border-color:rgba(76,175,130,0.2);}50%{border-color:rgba(76,175,130,0.6);}}
  @keyframes glowBlue{0%,100%{border-color:rgba(96,165,250,0.2);}50%{border-color:rgba(96,165,250,0.6);}}
  @keyframes glowPurple{0%,100%{border-color:rgba(155,142,245,0.2);}50%{border-color:rgba(155,142,245,0.6);}}
  @keyframes bonusPulse{0%,100%{border-color:rgba(76,175,130,0.25);}50%{border-color:rgba(76,175,130,0.7);}}
  .sg-meta{font-size:13px;color:var(--muted);margin-top:3px;}
  .sg-right{text-align:right;flex-shrink:0;}
  .sg-price{font-size:15px;font-weight:700;color:var(--gold);}
  .sg-arr{font-size:13px;color:rgba(201,168,76,0.3);margin-top:3px;}
  .sg-full{grid-column:1/-1;}
  /* Micro-animations */
  @keyframes sg-drip{0%,100%{transform:scaleY(1) translateY(0);}50%{transform:scaleY(1.35) translateY(2px);}}
  .sg-card:hover .sg-drop{animation:sg-drip 1.2s ease-in-out infinite;transform-origin:center top;}
  .sg-gk-line{opacity:0.25;transition:opacity .3s;}
  .sg-card:hover .sg-gk-line{opacity:1;}
  .sg-roller{transition:transform .3s;}
  .sg-card:hover .sg-roller{transform:translateY(3px);}
  .sg-spatula{transition:transform .3s;transform-origin:bottom center;}
  .sg-card:hover .sg-spatula{transform:rotate(10deg);}
  .sg-win-inner{opacity:0.15;transition:opacity .3s;}
  .sg-card:hover .sg-win-inner{opacity:1;}
  @keyframes sg-bubble{0%,100%{transform:scale(1);}50%{transform:scale(1.07);}}
  .sg-card:hover .sg-chat{animation:sg-bubble 1s ease-in-out infinite;}

  .flash-confirm{background:rgba(76,175,130,0.12);border:1px solid rgba(76,175,130,0.35);border-radius:10px;padding:8px 12px;font-size:13px;color:#4CAF82;display:flex;align-items:center;gap:8px;width:100%;animation:flashIn .3s ease;}
  @keyframes flashIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
  .tb-header{background:linear-gradient(110deg,var(--bg-header-from) 0%,var(--bg-header-mid) 55%,var(--bg-header-to) 100%);flex-shrink:0;border-bottom:1px solid rgba(201,168,76,0.25);}
  .tb-header-single{display:flex;align-items:center;padding:6px 11px;gap:8px;min-height:52px;}
  .tb-header-bot{display:none;}
  #tb-close{display:flex;align-items:center;gap:4px;background:rgba(224,85,85,0.12);border:1px solid rgba(224,85,85,0.35);border-radius:7px;padding:0 10px;height:34px;cursor:pointer;color:#E05555;font-size:12px;font-weight:600;flex-shrink:0;}
  #tb-back{display:flex;align-items:center;gap:3px;background:rgba(201,168,76,0.15);border:1px solid rgba(201,168,76,0.3);border-radius:7px;padding:0 10px;height:34px;cursor:pointer;color:var(--gold-light);font-size:13px;font-weight:600;flex-shrink:0;opacity:0;pointer-events:none;}
  #tb-back.on{opacity:1;pointer-events:all;}
  .tb-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-dark));display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;}
  .tb-title{flex:1;min-width:0;text-align:left;}
  .tb-title h3{font-size:13px;font-weight:700;color:var(--gold-light);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tb-title p{font-size:10px;color:rgba(201,168,76,0.55);text-align:left;}
  .tb-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);flex-shrink:0;}
  .hdr-btn{width:44px;height:44px;border-radius:8px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.08);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;}
  .hdr-icons{display:flex;gap:6px;align-items:center;}
  .tb-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;background:var(--bg-msgs);scroll-behavior:smooth;-webkit-overflow-scrolling:touch;}
  @keyframes fadeInUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .bubble{max-width:92%;padding:12px 15px;border-radius:16px;font-size:16px;line-height:1.5;animation:fadeInUp 0.25s ease-out forwards;}
  .bubble.bot{background:var(--bg-bubble-bot);color:var(--text);border:1px solid var(--border-bubble);border-bottom-left-radius:5px;align-self:flex-start;}
  .bubble.user{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#0E0E0F;font-weight:600;border-bottom-right-radius:5px;align-self:flex-end;}
  @media(min-width:601px){.bubble.bot{max-width:75%;}.bubble.user{max-width:65%;}}
  .ai-actions { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
  .ai-btn { background: var(--bg-btn); border: 1px solid var(--gold); color: var(--gold); border-radius: 30px; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; }
  .ai-btn:hover { background: var(--gold); color: #0E0E0F; transform: scale(1.02); }
  .ai-btn.call { background: var(--green); border-color: var(--green); color: white; }
  .choices{display:flex;flex-direction:column;gap:8px;width:100%;}
  .c-btn{background:var(--bg-btn);color:var(--text);border:1px solid var(--border-input);border-radius:12px;padding:12px 15px;font-size:15px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:10px;transition:all .15s;}
  .c-btn:hover{background:rgba(201,168,76,0.1);border-color:var(--gold);transform:translateX(4px);}
  .c-num{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#0E0E0F;font-size:14px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
  .c-body{flex:1;}
  .c-row{display:flex;align-items:baseline;justify-content:space-between;gap:8px;}
  .c-label{font-size:16px;font-weight:500;}
  .c-price{font-size:13px;font-weight:700;color:var(--gold);white-space:nowrap;}
  .c-desc{font-size:13px;color:var(--muted);margin-top:3px;}
  .cb-wrap{display:flex;flex-direction:column;gap:6px;}
  .cb-section{background:var(--bg-bubble-bot);border:1px solid var(--border-bubble);border-radius:14px;padding:10px 12px;width:100%;}
  .cb-section-title{font-size:11px;font-weight:700;color:var(--gold);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid rgba(201,168,76,0.15);}
  .cb-item{background:var(--bg-btn);border:1px solid var(--border-input);border-radius:10px;padding:8px 10px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:all .15s;}
  .cb-item.checked{background:rgba(76,175,130,0.1);border-color:rgba(76,175,130,0.5);}
  .cb-box{width:22px;height:22px;border-radius:5px;border:2px solid rgba(201,168,76,0.5);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;}
  .cb-item.checked .cb-box{background:var(--green);border-color:var(--green);color:white;}
  .cb-body{flex:1;min-width:0;}
  .cb-row{display:flex;justify-content:space-between;align-items:center;gap:6px;}
  .cb-add-btn{font-size:10px;font-weight:700;color:var(--gold);background:rgba(201,168,76,0.12);border:1px solid rgba(201,168,76,0.35);border-radius:14px;padding:2px 8px;flex-shrink:0;white-space:nowrap;pointer-events:none;}
  .cb-item.checked .cb-add-btn{background:var(--green);border-color:var(--green);color:#fff;}
  .cb-label{font-size:14px;font-weight:500;color:var(--text);}
  .cb-price{font-size:12px;font-weight:700;color:var(--gold);}
  .cb-sdesc{font-size:12px;color:var(--muted);}
  .cb-confirm,.cb-skip{margin-top:6px;padding:12px;border-radius:10px;font-size:14px;font-weight:bold;border:none;cursor:pointer;width:100%;}
  .cb-confirm{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#0E0E0F;}
  .cb-skip{background:transparent;color:var(--muted);border:1px solid var(--border-bubble);}
  .cb-hint{font-size:11px;color:var(--gold);background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.2);border-radius:8px;padding:6px 10px;margin-bottom:2px;display:flex;align-items:center;gap:5px;}
  .ne-znam-hint{color:#E05555;font-weight:600;}
  .typing{display:flex;gap:5px;padding:10px 15px;background:var(--bg-bubble-bot);border:1px solid var(--border-bubble);border-radius:16px;width:fit-content;}
  .typing span{width:8px;height:8px;border-radius:50%;background:var(--gold);animation:tdot 1.2s infinite;}
  @keyframes tdot{0%,80%,100%{transform:scale(.7);opacity:.4;}40%{transform:scale(1);opacity:1;}}
  .tb-input-row{display:flex;gap:8px;padding:12px;border-top:1px solid var(--border-bubble);background:var(--bg-input-row);}
  #tb-input{flex:1;background:var(--bg-btn);border:1px solid var(--border-input);border-radius:12px;padding:12px 15px;color:var(--text);font-size:16px;outline:none;}
  #tb-input:focus{border-color:var(--gold);}
  #tb-send{width:50px;height:50px;border-radius:12px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border:none;cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;}
  .action-btns{display:flex;gap:5px;padding:5px 8px 6px;background:var(--bg-input-row);}
  .act-btn{flex:1;padding:8px 3px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:3px;white-space:nowrap;}
  .act-pdf{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#0E0E0F;}
  .act-viber{background:linear-gradient(135deg,#7360F2,#5A4BD1);color:#fff;}
  .act-new{background:var(--bg-btn);color:var(--muted);border:1px solid var(--border-bubble);}
  .call-btn{background:var(--green);color:#fff;border:none;padding:6px 12px;border-radius:20px;font-size:13px;font-weight:bold;cursor:pointer;display:inline-flex;align-items:center;gap:5px;margin-top:4px;}
  .contact-form{background:var(--bg-btn);border:1px solid var(--border-input);border-radius:14px;padding:14px;display:flex;flex-direction:column;gap:10px;margin-top:8px;}
  .contact-form input{background:var(--bg-msgs);border:1px solid var(--border-input);border-radius:10px;padding:10px 14px;color:var(--text);font-size:15px;outline:none;width:100%;}
  .contact-form input:focus{border-color:var(--gold);}
  .contact-form input::placeholder{color:var(--muted);}
  .cf-submit{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#0E0E0F;border:none;border-radius:10px;padding:12px;font-size:15px;font-weight:700;cursor:pointer;width:100%;}
  .cf-skip{background:transparent;color:var(--muted);border:none;font-size:13px;cursor:pointer;padding:4px;text-align:center;}

  /* Offer summary styles */
  .offer-summary-container{display:flex;flex-direction:column;gap:0;}
  .offer-title{font-size:13px;font-weight:700;color:var(--gold);margin-bottom:10px;letter-spacing:0.5px;}

function updateCartBar(){
  const cartEmpty = document.getElementById('cart-bar-empty');

  }
  const total = panelItems.reduce((s,it) => s+it.total, 0);

  cartActive.style.display = 'block';
  cartCount.textContent = '🛒 ' + panelItems.length + ' ' + (panelItems.length === 1 ? 'услуга' : 'услуги') + ' добавени';

function isDuplicate(serviceName, serviceType, unit){
  return panelItems.some(p => {
    const sameService = p.label.includes(serviceName) || p.label === serviceName;
    const sameType = serviceType ? p.label.includes(serviceType) : true;
    const sameUnit = p.unit === unit;
    return sameService && sameType && sameUnit;
  });
}

function addToPanel(label, qty, unit, price){
  const baseLabel = label.replace(/ \d+$/, '').replace(/ \(\d+\)$/, '');
  const duplicates = panelItems.filter(p =>
    p.label === baseLabel ||
    p.label.startsWith(baseLabel + ' ') ||
    p.label.startsWith(baseLabel + ' (')
  );
  if(duplicates.length === 0){
    panelItems.push({ id: ++idSeq, label: baseLabel, qty, unit, price, total: Math.round(qty * price * 100) / 100 });
    renderPanel();
    showFlashConfirm(`${baseLabel} — ${eur(qty*price)} €`);
    return;
  }
  // Дублирана услуга — намираме следващия свободен номер
  const nextNum = duplicates.length + 1;
  const autoLabel = `${baseLabel} ${nextNum}`;
  panelItems.push({ id: ++idSeq, label: autoLabel, qty, unit, price, total: Math.round(qty * price * 100) / 100 });
  renderPanel();
}

function parseNum(val){
  // Приема и точка и запетая като десетичен разделител
  const n = parseFloat(String(val).replace(',','.'));
  if(isNaN(n) || n <= 0) return null;
  // Закръгляме до 2 знака след запетаята
  return Math.round(n * 100) / 100;
}

function smartFallback(question) {
  const q = question.toLowerCase();
  // Срокове
  if (/срок|колко дни|колко време|кога ще|бързо|спешно/i.test(q))
    return { text: 'Сроковете зависят от вида и обема на работа и се определят след оглед на обекта. Работим организирано и спазваме договорените срокове — без изненади.' };
  // Гаранция
  if (/гаранц/i.test(q))
    return { text: 'Даваме гаранция на всички изпълнени дейности. Условията се уточняват при огледа и се записват в договора.' };
  // Материали
  if (/материал|осигур|снабд/i.test(q))
    return { text: 'Работим и с двата варианта — материали от нас или от клиента. Всички цени в бота са само за труд, без материали.' };
  // Плащане
  if (/плащ|аванс|депозит|как се плаща|брой|банк/i.test(q))
    return { text: 'Плащането се договаря индивидуално — обикновено аванс и финално плащане след завършване. Никакви скрити такси.' };
  // Локация
  if (/работит|покриват|район|квартал|град|sofia|софия|варна|пловдив|къде|идват|елате|дойдете|до нас|при нас|обслужват|покривате/i.test(q))
    return { text: `Работим основно в София и околността. Обадете се на ${PHONE_DISPLAY} и ще уточним дали покриваме вашия район.` };
  // Оглед
  if (/оглед|замер|дойд|елате|безплатен/i.test(q))
    return { text: 'Огледът е напълно безплатен и без ангажимент. Обадете се и уговаряме удобен час.' };
  // Опит / доверие
  if (/опит|години|референц|препорък|доверие|снимк|работа ви|виж|покаж/i.test(q))
    return { text: `Зад нас стоят години опит и доволни клиенти. Пишете ни в Viber на ${PHONE_DISPLAY} и ще ви изпратим снимки от изпълнени обекти.` };
  // Квадратура
  if (/квадратура|кв|м²|колко метра|площ/i.test(q))
    return { text: 'Изберете услуга от менюто и въведете квадратурата — ботът ще изчисли ориентировъчната цена веднага. Ако не знаете квадратурата, можем да дойдем да замерим безплатно.' };
  // Default
  return { text: `За този въпрос най-бързо ще получите отговор на 📞 <strong>${PHONE_DISPLAY}</strong> или пишете в Viber — отговаряме бързо.` };
}

let msgTimestamps = [];
const MAX_MSG_PER_MINUTE = 30;
function canSendMessage(){
  const now = Date.now();
  msgTimestamps = msgTimestamps.filter(t => now - t < 60000);
  if(msgTimestamps.length >= MAX_MSG_PER_MINUTE){
    addBubble("🔒 Изпращате твърде много съобщения. Моля, изчакайте минута.", "bot");
    return false;
  }
  msgTimestamps.push(now);
  return true;
}

// ======================== УНИВЕРСАЛНО ОБЯСНЕНИЕ ЗА КВАДРАТУРА ========================
const AREA_EXPLANATION = `📏 <strong>Как се смята квадратурата:</strong><br><br>
🔲 <strong>Таван</strong> — дължина × ширина на стаята<br>
<span style="font-size:12px;color:var(--muted);">Пример: стая 5м × 4м = 20 м²</span><br><br>
🧱 <strong>Стени</strong> — всяка стена: ширина × височина, после събери<br>
<span style="font-size:12px;color:var(--muted);">Пример: (5+4+5+4) × 2.5м = 45 м²</span><br><br>
🏠 <strong>Ако имате "апартамент 65 кв"</strong> — това е само пода, не стените или тавана.<br><br>
<span style="font-size:13px;color:rgba(201,168,76,0.8);">Не сте сигурни? Напишете приблизително или изберете безплатен оглед.</span>`;

// Разпознава дали клиентът знае точно какво мери (стена/таван) или е объркан
function parseAreaInput(val, norm){
  const lower = norm.toLowerCase();
  // Знае точно — стена или таван
  const knowsWhat = /стена|стени|stena|steni|таван|tavan|тавана|tavana|прозорец|прозорци|дограма|линеин|л\.м|лм/i.test(lower);
  // Объркан — дава стая/апартамент/жилище
  const confused = /стая|стаята|апартамент|apartment|apartament|жилище|имот|staya|квадрат на стая/i.test(lower);
  // Число в текста
  const numMatch = lower.match(/\b(\d+(?:[.,]\d+)?)\b/);
  const num = numMatch ? parseFloat(numMatch[1].replace(',','.')) : null;

  if(knowsWhat && num && num > 0) return { type:'direct', value: num };
  if(confused) return { type:'explain', value: num };
  return null;
}

function handleUnknownArea(){
  ctx.pendingService = { price: ctx.price, serviceName: ctx.serviceName, serviceType: ctx.serviceType, displayUnit: ctx.displayUnit || 'м²' };
  addBubble(AREA_EXPLANATION, 'bot');
  const div = document.createElement('div'); div.className = 'choices';

function sendToFormspree(phone, services, total, onError){
  const body = {
    телефон: phone,
    услуги: services || 'не е посочено',
    сума: total ? total + ' €' : 'не е изчислена',
    дата: new Date().toLocaleString('bg-BG')
  };
  fetch('https://formspree.io/f/mpqovoya', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
    body: JSON.stringify(body)
  }).then(r => {
    if(!r.ok){ addBubble('⚠️ Не успяхме да изпратим данните. Моля обадете се на 📞 ' + PHONE_DISPLAY, 'bot'); if(onError) onError(); }
    else { tbTrack('lead_submitted', { value: total || 0 }); }
  }).catch(() => {
    addBubble('⚠️ Няма интернет връзка. Моля обадете се на 📞 ' + PHONE_DISPLAY, 'bot'); if(onError) onError();
  });
}

let cur = 'start', ctx = {}, offer = [], hist = [], cbQueue = [];
ctx._queueAwaitingArea = false; ctx.queueArea = null; ctx.usesPrevArea = false;
let _backBusy = false;
let _backFromHistory = false;
let _replaceNextHistory = false; // Фикс #C: следващият go() ще ползва replaceState

function pushHist(){
  hist.push({ cur, dom: elMsgs.children.length, ctx: JSON.parse(JSON.stringify(ctx)), panel: JSON.parse(JSON.stringify(panelItems)), cbQueue: cbQueue.slice() });
  elBack.classList.toggle('on', hist.length > 0);
}
function restoreSnap(snap){
  cur = snap.cur; ctx = JSON.parse(JSON.stringify(snap.ctx)); panelItems = JSON.parse(JSON.stringify(snap.panel)); cbQueue = snap.cbQueue ? snap.cbQueue.slice() : [];
  renderPanel();
}
function updateBackBtn(){
  const hidden = ['start','before_we_start'];
  const isOverlayOpen = document.getElementById('offer-overlay').classList.contains('open');
  if(isOverlayOpen || hidden.includes(cur) || hist.length === 0){
    elBack.classList.remove('on');
    return;
  }
  elBack.classList.add('on');
  // Динамичен текст
  const serviceMenus = ['gk_menu','putty_menu','painting_menu','windows_menu','vik_menu'];
  const areaInputs = ['gk_area','gk_length','putty_area','painting_area','windows_count','vik_count'];
  if(serviceMenus.includes(cur)) elBack.textContent = '⬅ Услуги';
  else if(areaInputs.includes(cur)) elBack.textContent = '⬅ Промени';
  else if(cur === 'consultation') elBack.textContent = '⬅ Меню';
  else elBack.textContent = '⬅ Назад';
}

function goBack(){
  if(!hist.length || _backBusy) return;
  // Ако pkg-sheet е отворен — затваряме го и възстановяваме бутоните
  const pkgSheet = document.getElementById('pkg-sheet');
  if(pkgSheet && pkgSheet.style.transform === 'translateY(0)'){
    closePackageSheet();
    elInputRow.style.display = 'flex';
    // Б2: прескачаме offer_summary/gk_packages в hist — намираме безопасно състояние
    const badStates = ['offer_summary','gk_packages','painting_packages'];
    while(hist.length && badStates.includes(hist[hist.length-1].cur)) hist.pop();
    if(hist.length){
      const snap = hist[hist.length-1];
      restoreSnap(snap);
      clearCho();
      while(elMsgs.children.length > snap.dom) elMsgs.removeChild(elMsgs.lastChild);
      const def = S[cur]; updateBackBtn();
      setTimeout(() => {
        if(def && def.checkboxesFn) renderCheckboxes(def.checkboxesFn(ctx), ctx.lastService);
        else if(def && def.choicesFn) renderCho(def.choicesFn(ctx));
        else if(def && def.choices && def.choices.length) renderCho(def.choices);
        else if(def && def.onEnter) def.onEnter();
        else if(def && def.input) setInp(true, def.label || 'Въведете…');
      }, 120);
    }
    return;
  }
  // Ако overlay е отворен — затваряме го и възстановяваме choices
  if(document.getElementById('offer-overlay').classList.contains('open')){
    hideOfferOverlay();
    // Б1: след затваряне на overlay — възстановяваме choices от текущото състояние
    setTimeout(() => {
      const def = S[cur];
      if(!choEl && def){
        if(def.checkboxesFn) renderCheckboxes(def.checkboxesFn(ctx), ctx.lastService);
        else if(def.choicesFn) renderCho(def.choicesFn(ctx));
        else if(def.choices && def.choices.length) renderCho(def.choices);
        else if(def.onEnter) def.onEnter();
      }
    }, 200);
    return;
  }
  _backBusy = true;
  setTimeout(() => { _backBusy = false; }, 600);
  const snap = hist.pop();
  // 63: ако историята е изчерпана — скриваме Назад
  if(hist.length === 0) elBack.classList.remove('on');
  // Fix 5: нулираме cbQueue при Назад
  cbQueue = snap.cbQueue ? snap.cbQueue.slice() : [];
  ctx._queueAwaitingArea = false;
  ctx._gridQueuePending = false;
  // Е5: нулираме _savedQueueForNew при Назад — за да не се възстанови стара опашка
  ctx._savedQueueForNew = null;
  // Ако панелът има повече услуги отколкото в snapshot → махаме добавените
  if(panelItems.length > snap.panel.length){
    panelItems = JSON.parse(JSON.stringify(snap.panel));
    renderPanel();
  }
  restoreSnap(snap);
  clearCho();
  // Fix 3: винаги показваме input полето след Назад
  elInputRow.style.display = 'flex';
  elInp.disabled = true; elSend.disabled = true;
  while(elMsgs.children.length > snap.dom) elMsgs.removeChild(elMsgs.lastChild);
  const def = S[cur];
  updateBackBtn();
  if(def && def.checkboxesFn) setTimeout(() => { renderCheckboxes(def.checkboxesFn(ctx), ctx.lastService); _backBusy = false; }, 120);
  else if(def && def.choicesFn) setTimeout(() => { renderCho(def.choicesFn(ctx)); _backBusy = false; }, 120);
  else if(def && def.choices && def.choices.length) setTimeout(() => { renderCho(def.choices); _backBusy = false; }, 120);
  else if(def && def.onEnter) setTimeout(() => { def.onEnter(); _backBusy = false; }, 120);
  else { if(def && def.input){ setInp(true, def.label || 'Въведете…'); } _backBusy = false; }

}
function bubbleBack(el){
  if(_backBusy) return;
  const nodes = Array.from(elMsgs.children), idx = nodes.indexOf(el);
  if(idx < 0) return;
  let si = -1;
  for(let i=hist.length-1; i>=0; i--) if(hist[i].dom <= idx){ si=i; break; }
  if(si < 0){ goBack(); return; }
  _backBusy = true;
  setTimeout(() => { _backBusy = false; }, 600);
  const snap = hist[si]; hist = hist.slice(0, si); restoreSnap(snap);
  clearCho(); setInp(false, '');
  elInputRow.style.display = 'flex';
  while(elMsgs.children.length > idx+1) elMsgs.removeChild(elMsgs.lastChild);
  const def = S[cur];
  if(def && def.checkboxesFn) setTimeout(() => { renderCheckboxes(def.checkboxesFn(ctx)); _backBusy = false; }, 120);
  else if(def && def.choicesFn) setTimeout(() => { renderCho(def.choicesFn(ctx)); _backBusy = false; }, 120);
  else if(def && def.choices && def.choices.length) setTimeout(() => { renderCho(def.choices); _backBusy = false; }, 120);
  else if(def && def.onEnter) setTimeout(() => { def.onEnter(); _backBusy = false; }, 120);
  else { if(def && def.input) setInp(true, def.label || 'Въведете…'); _backBusy = false; }

}

function processQueue(){
  if(!cbQueue.length){ ctx.queueArea = null; go('offer_summary'); return; }
  const item = cbQueue.shift();
  ctx.price = item.price; ctx.serviceName = item.serviceName; ctx.serviceType = item.serviceType; ctx.displayUnit = item.displayUnit || 'м²';
  const unitsMismatch = ctx.prevUnit && ctx.prevUnit !== ctx.displayUnit;
  if(unitsMismatch){
    ctx.queueArea = null;
    setInp(true, `Въведете ${ctx.displayUnit}…`);
    ctx._queueAwaitingArea = true;
  } else if(ctx.queueArea){
    ctx.value = ctx.queueArea; goDirectResult(item);
  } else if(ctx.prevValue && ctx.prevUnit === ctx.displayUnit){
    go('confirm_area_once');
  } else {
    go('confirm_area_once');
  }
}

function goDirectResult(item){
  const unit = ctx.displayUnit || 'м²';
  const qty = item.qty !== undefined ? item.qty : ctx.value;
  ctx.value = qty;
  const label = item.serviceName + (item.serviceType ? ` (${item.serviceType})` : '');
  addToPanel(label, qty, unit, ctx.price);
  // Fix 20: flash confirm винаги се показва
  if(item.saveKey){ ctx.lastService = item.saveKey; ctx.prevValue = qty; ctx.prevUnit = unit; }
  pushHist(); cur = item.resultState;
  showTyping();
  setTimeout(() => { hideTyping(); addBubble(calcMsg(ctx, unit), 'bot', true); setTimeout(processQueue, 400); }, 300);
}

async function onCho(c){
  clearCho();
  if(c.reset){ fullReset(); return; }
  if(c.specialCall){ callPhone(); return; }
  if(c.specialBack){ clearCho(); goBack(); return; }

  if(c.next === '_queue_new'){
    addBubble(c.label, 'user', false);
    // Б4: запазваме cbQueue контекста — не го нулираме
    const savedQueue = cbQueue.slice();
    const savedDisplayUnit = ctx.displayUnit || 'м²';
    ctx._savedQueueForNew = savedQueue;
    ctx._queueAwaitingArea = true;
    setInp(true, `Въведете ${savedDisplayUnit}…`);
    return;
  }
  addBubble(c.label, 'user', false);
  if(c.price !== undefined) ctx.price = c.price;
  if(c.serviceName !== undefined) ctx.serviceName = c.serviceName;
  if(c.serviceType !== undefined) ctx.serviceType = c.serviceType;
  if(c.displayUnit !== undefined) ctx.displayUnit = c.displayUnit;
  if(c.confirmNext !== undefined) ctx.confirmNext = c.confirmNext;
  if(c.sameArea && ctx.prevValue){
    const target = ctx.confirmNext, isMenu = target && target.indexOf('_menu') !== -1;
    if(isMenu){ ctx.usesPrevArea = true; setTimeout(() => go(target), 380); }
    else{ ctx.value = ctx.prevValue; ctx.displayUnit = ctx.prevUnit || 'м²'; setTimeout(() => go(target.replace(/_area(_manual)?$/, '_result')), 380); }
    return;
  }
  // При 'start' — изчистваме чата и показваме grid отгоре
  if(c.next === 'start'){
    setTimeout(() => {
      clearCho();
      setInp(false, '');
      elInp.placeholder = '';
      elInputRow.style.display = window.innerWidth > 600 ? 'flex' : 'none';
      elMsgs.innerHTML = '';
      hist = []; cur = 'start';
      elBack.classList.remove('on');
      elMsgs.scrollTop = 0;
      go('start');
    }, 380);
    return;
  }
  setTimeout(() => go(c.next), 380);
}

function go(name){
  const def = S[name]; if(!def){ console.warn('Missing state:', name); return; }
  if(cur === 'offer_summary'){ elInputRow.style.display = 'flex'; elActionBtns.style.display = 'none'; }
  if(def.input === 'number' && ctx.usesPrevArea && ctx.prevValue){
    const targetUnit = def.displayUnit || 'м²';
    if(ctx.prevUnit && ctx.prevUnit !== targetUnit){
      ctx.usesPrevArea = false;
    } else {
      ctx.value = ctx.prevValue; ctx.displayUnit = ctx.prevUnit || 'м²'; ctx.usesPrevArea = false;
      pushHist(); cur = name; showTyping();
      setTimeout(() => { hideTyping(); addBubble(def.msg(ctx), 'bot', true); setTimeout(() => go(def.next), 480); }, 300);
      return;
    }
  }
  if(def.displayUnit && !ctx.displayUnit) ctx.displayUnit = def.displayUnit;
  if(def.save && ctx.value && ctx.price && !ctx._skipSave){
    const unit = ctx.displayUnit || def.save.unit || 'м²';
    const label = def.save.pre + (ctx.serviceType ? ` (${ctx.serviceType})` : '');
    addToPanel(label, ctx.value, unit, ctx.price);
    if(def.save.last){ ctx.lastService = def.save.last; ctx.prevValue = ctx.value; ctx.prevUnit = unit; }
  }
  ctx._skipSave = false;
  pushHist(); cur = name;
  // Browser history integration — добавя запис при всяка нормална навигация
  if (!_backFromHistory) {
    try {
      if (_replaceNextHistory) {
        history.replaceState({ botStep: hist.length, state: name }, '');
        _replaceNextHistory = false;
      } else {
        history.pushState({ botStep: hist.length, state: name }, '');
      }
    } catch(e) {}
  }
  updateBackBtn();
  showTyping();
  setTimeout(async () => {
    hideTyping();
    let msgHtml = typeof def.msg === 'function' ? def.msg(ctx) : def.msg;
    let newBubble = null;
    if(msgHtml){
      newBubble = addBubble(msgHtml, 'bot', false);
    }

    // Скрол функция — скролира към bubble
    const scrollToBubble = () => {
      if(!newBubble) return;
      const top = newBubble.offsetTop - 8;
      elMsgs.scrollTo({ top, behavior:'instant' });
    };

    if(def.onEnter) setTimeout(() => def.onEnter(), 50);
    if(def.checkboxesFn) setTimeout(() => {
      renderCheckboxes(def.checkboxesFn(ctx), ctx.lastService);
      scrollToBubble();
    }, 350);
    else if(def.choicesFn) setTimeout(() => {
      renderCho(def.choicesFn(ctx));
      scrollToBubble();
    }, 350);
    else if(def.choices && def.choices.length) setTimeout(() => {
      renderCho(def.choices);
      scrollToBubble();
    }, 350);
    else if(def.autoNext){
      const delay = msgHtml ? 600 : 50;
      if(cbQueue.length) setTimeout(processQueue, delay);
      else setTimeout(() => go(def.autoNext), delay);
    } else if(!def.onEnter) {
      setTimeout(scrollToBubble, 80);
    }
    if(def.input){
      // Вариант А: ако услугата вече е в панела → показваме формата с две полета
      if(def.input === 'number' && isDuplicateService()){
        showDuplicateForm((sqVal, roomName) => {
          const unit = ctx.displayUnit || def.displayUnit || 'м²';
          ctx.value = sqVal; ctx.prevValue = sqVal; ctx.prevUnit = unit; ctx._lastArea = sqVal;
          const baseType = ctx.serviceType || '';
          const duplicates = panelItems.filter(p =>
            baseType ? p.label.includes(`(${baseType})`) : p.label.startsWith(ctx.serviceName || '')
          );
          const nextNum = duplicates.length + 1;
          // Използваме label-а от съществуващото (напр. 'Шпакловка') + зона или номер
          const existingBase = duplicates.length > 0
            ? duplicates[0].label.replace(/ \d+$/, '').replace(/ \([^)]+\)$/, '')
            : (ctx.serviceName || '');
          const typeStr = baseType ? ` (${baseType})` : '';
          const autoLabel = roomName
            ? `${existingBase}${typeStr} (${roomName})`
            : `${existingBase}${typeStr} ${nextNum}`;
          panelItems.push({ id: ++idSeq, label: autoLabel, qty: sqVal, unit, price: ctx.price, total: Math.round(sqVal * ctx.price * 100) / 100 });
          renderPanel();
          showFlashConfirm(`${autoLabel} — ${eur(sqVal * ctx.price)} €`);
          ctx._skipSave = true;
          ctx.lastService = def.next ? def.next.replace('_result','') : ctx.lastService;
          if(cbQueue.length) setTimeout(processQueue, 380);
          else setTimeout(() => go(def.next), 380);
        });
      } else {
        elInputRow.style.display = 'flex';
        elInp.style.display = '';
        setInp(true, def.label || 'Въведете…');
      }
    }
  }, 300);
}

function isDuplicateService(){
  if(!ctx.serviceName && !ctx.serviceType) return false;
  const baseName = ctx.serviceName || '';
  const baseType = ctx.serviceType || ctx._paintServiceType || '';
  const fullName = baseName + (baseType ? ` (${baseType})` : '');
  return panelItems.some(p => {
    // Точно съвпадение
    if(p.label === fullName) return true;
    // Без тип — само ime
    if(!baseType && p.label === baseName) return true;
    // Различни форми на едно и също (Шпакловки/Шпакловка + тип)
    if(baseType && p.label.includes(`(${baseType})`)) return true;
    return false;
  });
}

function extractArea(text) {
  const match = text.match(/\b(\d+(?:\.\d+)?)\s*(?:кв\.?м|kv|m2|кв|м²)/i);
  if (match) return parseFloat(match[1]);
  const match2 = text.match(/\b(\d+(?:\.\d+)?)\b/);
  if (match2 && !text.includes('цена') && !text.includes('колко')) return parseFloat(match2[1]);
  return null;
}

function isAskingForMaterials(question) {
  const q = question.toLowerCase();
  return /материал|материали|грунд.*струва|боя.*струва|латекс.*струва|цена на грунд|цена на боя|колко струва грунд|скъп ли е грунд/i.test(q);
}

function handlePriceQuestion(question, areaFromInput = null) {
  const q = question.toLowerCase();
  if (isAskingForMaterials(question)) {
    return `Цената на материала зависи от марката и магазина. За безплатен оглед и точно остойностяване се обадете на ${PHONE_DISPLAY}.`;
  }
  const isAskingPrice = /колко|цена|струва|скъпо|цената на|колко е|струват|цените|сума|изчислението/i.test(q);
  if (!isAskingPrice && areaFromInput === null) return null;

  let area = areaFromInput;
  if (area === null) area = extractArea(q);
  
  function priceResponse(pricePerUnit, serviceName) {
    if (area && area > 0) {
      const total = area * pricePerUnit;
      const totalEur = (total / 1.95583).toFixed(2);
      return `${serviceName} – ${pricePerUnit} лв/м² × ${area} м² = ${total} лв (${totalEur} €) **само за труд** (без материали).`;
    } else {
      return `${serviceName} – ${pricePerUnit} лв/м² **само за труд** (без материали). Нужна е квадратура за точна сума.`;
    }
  }

  if (q.includes('шпакловка') || q.includes('шпак')) {
    if (q.includes('основна') || q.includes('укрепваща')) return priceResponse(16, 'Основна укрепваща шпакловка');
    if (q.includes('гипсова') || q.includes('армировка')) return priceResponse(12, 'Гипсова шпакловка с армировка');
    if (q.includes('финишна') || q.includes('огледална') || q.includes('финна')) return priceResponse(22, 'Финишна огледална шпакловка');
    return `Цените за шпакловка **само за труд** (без материали) са:
- Основна укрепваща: 16 лв/м²
- Гипсова с армировка: 12 лв/м²
- Финишна огледална: 22 лв/м²
Нужна е квадратура за изчисление.`;
  }
  if (q.includes('боядисване') || q.includes('боя')) {
    if (q.includes('бяло')) return priceResponse(9.77, 'Боядисване (бяло)');
    if (q.includes('стени')) return priceResponse(11.73, 'Боядисване (стени)');
    if (q.includes('таван')) return priceResponse(10, 'Боядисване (таван)');
    if (q.includes('премиум')) return priceResponse(14, 'Боядисване (премиум)');
    return `Цените за боядисване **само за труд** (без материали) са:
- Бяло: 9.77 лв/м²
- Стени: 11.73 лв/м²
- Таван: 10 лв/м²
- Премиум: 14 лв/м²
Нужна е квадратура.`;
  }
  if (q.includes('грунд') && !q.includes('материал')) {
    if (area) {
      const total = area * 2;
      const totalEur = (total / 1.95583).toFixed(2);
      return `Грунд (полагане) – 2 лв/м² × ${area} м² = ${total} лв (${totalEur} €) **само за труд** (без материали).`;
    } else {
      return `Грунд (полагане) – 2 лв/м² **само за труд** (без материали). Нужна е квадратура.`;
    }
  }
  if (q.includes('шлайфане')) return priceResponse(4, 'Шлайфане');
  if (q.includes('гипсокартон')) {
    if (q.includes('стена')) return priceResponse(38, 'Гипсокартон (стена)');
    if (q.includes('предстена')) return priceResponse(42, 'Предстена');
    if (q.includes('двоен')) return priceResponse(50, 'Двоен гипсокартон');
    return `Цени за гипсокартон **само за труд**:\n- Стена: 38 лв/м²\n- Предстена: 42 лв/м²\n- Двоен: 50 лв/м²`;
  }
  if (q.includes('таван') || q.includes('окачен таван')) {
    if (q.includes('прав')) return priceResponse(45, 'Прав окачен таван');
    
    if (q.includes('led')) return `LED ниша – 90 лв/л.м. **само за труд** (без материали). Нужни са линейни метри.`;
    return `Цени за гипсокартон **само за труд**:\n- Прав таван: 29.34 лв/м²\n- LED ниша: 50.85 лв/л.м.\n- Предстенна обшивка: 27.38 лв/м²\n- Преградна стена: 48.90 лв/м²`;
  }
  if (q.includes('прозорци') || q.includes('дограма') || q.includes('обръщане')) {
    if (area) {
      const total = area * 15;
      const totalEur = (total / 1.95583).toFixed(2);
      return `Обръщане на прозорци – 15 лв/л.м. × ${area} л.м. = ${total} лв (${totalEur} €) **само за труд** (без материали).`;
    } else {
      return `Обръщане на прозорци – 15 лв/л.м. **само за труд**. Нужни са линейни метри.`;
    }
  }
  if (q.includes('вик') || q.includes('смяна на') || q.includes('смесител') || q.includes('тоалетна') || q.includes('сифон')) {
    if (q.includes('смесител')) return `Смяна на смесител – 27 лв **само за труд** (без материали).`;
    if (q.includes('тоалетна')) return `Смяна на тоалетна чиния – 27 лв **само за труд** (без материали).`;
    if (q.includes('сифон')) return `Смяна на сифон – 18 лв **само за труд** (без материали).`;
    return `ВиК услуги (само труд): смесител 27 лв, тоалетна 27 лв, сифон 18 лв. Материалите се заплащат отделно.`;
  }
  return null;
}

function handleInp(){
  const val = elInp.value.trim();
  if(!val) return;
  if(!canSendMessage()){ elInp.value = ''; return; }
  const def = S[cur];

  // ── Нормализация на латински изписвания и диалект ───────────────────
  let norm = val.toLowerCase();
  // Шпакловка
  norm = norm.replace(/shpaklovk[ai]?|shpak|6paklovk[ai]?|6paklovkata|6pak|спакловка|шпаклувка/g, 'шпакловка');
  // Боядисване / латекс
  norm = norm.replace(/boqdisvane|boyadisvane|boya|баядисване|боядисавне/g, 'боядисване');
  norm = norm.replace(/латекс|lateks|latex/g, 'боядисване');  // Гипсокартон
  norm = norm.replace(/gipsokarton|gips|гипскартон/g, 'гипсокартон');
  // Таван
  norm = norm.replace(/tavan|акачен таван/g, 'таван');
  // Прозорци
  norm = norm.replace(/prozorci|prozortsi|продорци|dograma/g, 'прозорци');
  // ВиК
  norm = norm.replace(/\bvik\b|smesitel|toaletna|sifon|trubi/g, function(m){
    const map = {vik:'вик',smesitel:'смесител',toaletna:'тоалетна',sifon:'сифон',trubi:'тръби'};
    return map[m]||m;
  });
  // Шлайфане
  norm = norm.replace(/shlayfane|shlayf|shkurene|шлайфането|шкурене/g, 'шлайфане');
  // Грунд
  norm = norm.replace(/grund|grundirane|грунта/g, 'грунд');
  // Квадратура
  norm = norm.replace(/kvadratura|kvdratura|kv\.?m|m2|кватратура|квадратурата|колко метра|колко кв/g, 'квадратура');
  norm = norm.replace(/м²|кв\.?м/g, 'квадратура');

  // ── СТЪПКА 1: Чакаме число (квадратура) – keyword routing се пропуска ──
  if(ctx._gridQueuePending){
    const lower = norm;
    if(lower === 'не знам' || lower === 'незнам' || lower === '?' || lower === '0'){
      handleUnknownArea(); elInp.value = ''; setInp(false,''); ctx._gridQueuePending = false; return;
    }
    const n = parseNum(val);
    if(!n){ addBubble("❌ Моля, въведете положително число (например 80) или напишете 'не знам'.", 'bot'); elInp.value=''; setTimeout(()=>elInp.focus(),80); return; }
    addBubble(val, 'user', false); elInp.value=''; setInp(false,'');
    ctx.queueArea = n; ctx.prevValue = n; ctx.prevUnit = 'м²'; ctx._gridQueuePending = false;
    processGridQueue();
    return;
  }
  if(ctx._queueAwaitingArea){
    const lower = norm;
    if(lower === 'не знам' || lower === 'незнам' || lower === '?' || lower === '0'){
      handleUnknownArea(); elInp.value = ''; setInp(false, ''); ctx._queueAwaitingArea = false; return;
    }
    const parsed = parseAreaInput(val, norm);
    if(parsed && parsed.type === 'explain'){
      addBubble(val, 'user', false); elInp.value = '';
      addBubble(AREA_EXPLANATION, 'bot');
      setInp(true, 'Въведете м²…'); return;
    }
    if(parsed && parsed.type === 'direct'){
      addBubble(val, 'user', false); elInp.value = ''; setInp(false, '');
      ctx.queueArea = parsed.value; ctx.prevValue = parsed.value; ctx.prevUnit = 'м²'; ctx._queueAwaitingArea = false;
      // Б4: възстановяваме cbQueue ако е запазен от _queue_new
      if(ctx._savedQueueForNew){ cbQueue = ctx._savedQueueForNew.slice(); ctx._savedQueueForNew = null; }
      processQueue(); return;
    }
    const n = parseNum(val);
    if(!n){
      addBubble("❌ Моля, въведете число (например 25) или напишете 'не знам'.", "bot");
      elInp.value = ''; setTimeout(()=>elInp.focus(),80); return;
    }
    addBubble(val, 'user', false); elInp.value = ''; setInp(false, '');
    ctx.queueArea = n; ctx.prevValue = n; ctx.prevUnit = 'м²'; ctx._queueAwaitingArea = false;
    // Б4: възстановяваме cbQueue ако е запазен от _queue_new
    if(ctx._savedQueueForNew){ cbQueue = ctx._savedQueueForNew.slice(); ctx._savedQueueForNew = null; }
    processQueue();
    return;
  }
  if(def && def.input === 'number'){
    const lower = norm;
    if(lower === 'не знам' || lower === 'незнам' || lower === '?' || lower === '0'){
      handleUnknownArea(); elInp.value = ''; return;
    }
    // Smart detection — стая/апартамент → обяснение, стена/таван → директно
    const parsed = parseAreaInput(val, norm);
    if(parsed && parsed.type === 'explain'){
      addBubble(val, 'user', false); elInp.value = '';
      addBubble(AREA_EXPLANATION, 'bot');
      const unit = def.displayUnit || 'м²';
      setInp(true, `Въведете ${unit}…`);
      return;
    }
    if(parsed && parsed.type === 'direct'){
      const n = parsed.value;
      ctx.value = n; ctx.prevValue = n; ctx._lastArea = n; ctx.prevUnit = def.displayUnit || 'м²'; ctx.displayUnit = def.displayUnit || 'м²';
      addBubble(val, 'user', false); elInp.value = ''; setInp(false, '');
      if(cbQueue.length) setTimeout(processQueue, 380);
      else setTimeout(() => go(def.next), 380);
      return;
    }
    const n = parseNum(val);
    if(!n){
      addBubble("❌ Моля, въведете число (например 25). Ако не сте сигурни — напишете 'не знам'.", "bot");
      elInp.value = ''; setTimeout(()=>elInp.focus(),80); return;
    }
    ctx.value = n; ctx.prevValue = n; ctx._lastArea = n; ctx.prevUnit = def.displayUnit || 'м²'; ctx.displayUnit = def.displayUnit || 'м²';
    addBubble(val, 'user', false); elInp.value = ''; setInp(false, '');
    if(cbQueue.length) setTimeout(processQueue, 380);
    else setTimeout(() => go(def.next), 380);
    return;
  }

  // ── СТЪПКА 2: Ценови скрипт (работи с нормализирания текст) ─────────
  const priceAnswer = handlePriceQuestion(norm);
  if(priceAnswer){
    addBubble(val, 'user', false);
    elInp.value = ''; setInp(false, '');
    addBubble(priceAnswer, 'bot');
    setInp(true, "Напишете нов въпрос...");
    return;
  }

  // ── СТЪПКА 3: Keyword routing към менюта ─────────────────────────────
  // Ако въпросът е за материали/включване/осигуряване → smartFallback, не меню
  const isMaterialQuestion = /включен|осигур|материал|от вас|купув|доставя/i.test(norm);

  const isServiceKeyword = !isMaterialQuestion && (
    norm.includes('шпакловка') || norm.includes('шпак') ||
    norm.includes('боядисване') || norm.includes('боя') ||
    norm.includes('гипсокартон') || norm.includes(' гк') || norm === 'гк' ||
    norm.includes('таван') || norm.includes('окачен') ||
    norm.includes('прозорци') || norm.includes('дограма') || norm.includes('обръщане') ||
    norm.includes('вик') || norm.includes('смесител') || norm.includes('тоалетна') || norm.includes('сифон')
  );

  if(isServiceKeyword){
    addBubble(val, 'user', false);
    elInp.value = ''; setInp(false, '');
    if(norm.includes('шпакловка') || norm.includes('шпак')){
      setTimeout(() => go('putty_menu'), 380); return;
    }
    if(norm.includes('боядисване') || norm.includes('боя')){
      setTimeout(() => go('painting_menu'), 380); return;
    }
    if(norm.includes('гипсокартон') || norm.includes(' гк') || norm === 'гк'){
      setTimeout(() => go('gk_menu'), 380); return;
    }
    if(norm.includes('таван') || norm.includes('окачен')){
      setTimeout(() => go('gk_menu'), 380); return;
    }
    if(norm.includes('прозорци') || norm.includes('дограма') || norm.includes('обръщане')){
      setTimeout(() => go('windows_menu'), 380); return;
    }
    if(norm.includes('вик') || norm.includes('смесител') || norm.includes('тоалетна') || norm.includes('сифон')){
      setTimeout(() => go('vik_menu'), 380); return;
    }
  }

  // ── СТЪПКА 4: Свободен въпрос → smartFallback ───────────────────────
  addBubble(val, 'user', false);
  elInp.value = ''; setInp(false, '');
  showTyping();
  setTimeout(() => {
    hideTyping();
    const fb = smartFallback(norm);
    addFallbackResponse(fb.text);
  }, 600);
}

function hideOfferOverlay(){
  document.getElementById('offer-overlay').classList.remove('open');
  // Синхронизираме grid checkboxes — де-чекваме услуги махнати от overlay
  if(choEl){
    choEl.querySelectorAll('[data-id]').forEach(cell => {
      const id = cell.dataset.id;
      const item = Array.from(cell.querySelectorAll('.sg-name, [style*="font-weight:700;color:var(--text)"]'))[0];
      if(!item) return;
      // Намираме дали услугата е в панела по serviceType/serviceName
      const chkBox = cell.querySelector('[style*="border-radius:5px"]');
      if(!chkBox) return;
      const isInPanel = panelItems.some(p => p.label.includes(id) || p.label === id);
      if(!isInPanel && chkBox.textContent === '✓'){
        // Де-чекваме
        chkBox.textContent = '';
        chkBox.style.background = 'transparent';
        chkBox.style.borderColor = 'rgba(201,168,76,0.45)';
        cell.style.background = 'var(--bg-btn)';
        cell.style.borderColor = 'rgba(201,168,76,0.22)';
      }
    });
    // По-надежден подход — проверяваме по label
    choEl.querySelectorAll('[data-service-label]').forEach(cell => {
      const lbl = cell.dataset.serviceLabel;
      const chkBox = cell.querySelector('.sg-chk');
      if(!chkBox) return;
      const inPanel = panelItems.some(p => p.label === lbl || p.label.startsWith(lbl));
      if(!inPanel){
        chkBox.textContent = ''; chkBox.style.background = 'transparent'; chkBox.style.borderColor = 'rgba(201,168,76,0.45)';
        cell.style.background = 'var(--bg-btn)'; cell.style.borderColor = 'rgba(201,168,76,0.22)';
      }
    });
  }
  setTimeout(() => {
    const prevCur = window._overlayPrevCur;
    // Ако идваме от пакет → показваме choices
    if(!choEl && prevCur === 'offer_summary'){
      renderCho(S['add_more_services'].choices);
      return;
    }
    // Не възстановяваме offer_summary, gk_packages, states с onEnter (те рендират grid)
    const skipStates = ['gk_packages','painting_packages','offer_summary','putty_step2_gypsum','ceiling_gk_step1_fuge','contact_form_standalone'];
    if(!choEl && prevCur && S[prevCur] && !skipStates.includes(prevCur)){
      const def = S[prevCur];
      if(def.checkboxesFn) renderCheckboxes(def.checkboxesFn(ctx), ctx.lastService);
      else if(def.choicesFn) renderCho(def.choicesFn(ctx));
      else if(def.choices && def.choices.length) renderCho(def.choices);
    }
    if(!elInp.disabled) elInp.focus();
  }, 150);
}

// ======================== GRID CHECKBOXES ========================
function renderGridCheckboxes(items, knownArea, flowKey, onReady){
  clearCho();
  elInp.disabled = true; elSend.disabled = true;
  elInputRow.style.display = 'none';

  const wrap = document.createElement('div');
  wrap.style.cssText = 'background:var(--bg-bubble-bot);border:2px solid rgba(201,168,76,0.55);border-radius:16px;border-top-left-radius:4px;padding:14px 14px 12px;animation:gridPulse 1s ease-in-out 3;';

  // Д: bounce стрелка отгоре
  const arrow = document.createElement('div');
  arrow.style.cssText = 'display:flex;align-items:center;gap:6px;margin-bottom:10px;';
  arrow.innerHTML = `<span style="font-size:18px;display:inline-block;animation:bounceDown 0.8s ease-in-out 6;color:var(--gold);">👇</span>
    <span style="font-size:13px;font-weight:700;color:var(--gold);">Препоръчваме тези стъпки — избери за да добавиш:</span>`;
  wrap.appendChild(arrow);

  // Д: CSS анимации — добавяме в head ако не са там
  if(!document.getElementById('grid-anim-style')){
    const style = document.createElement('style');
    style.id = 'grid-anim-style';
    style.textContent = `
      @keyframes gridPulse {
        0%,100%{border-color:rgba(201,168,76,0.55);}
        50%{border-color:rgba(201,168,76,1);box-shadow:0 0 12px rgba(201,168,76,0.35);}
      }
      @keyframes bounceDown {
        0%,100%{transform:translateY(0);}
        50%{transform:translateY(5px);}
      }
    `;
    document.head.appendChild(style);
  }

  const title = document.createElement('div');
  title.style.cssText = 'font-size:13px;font-weight:700;color:var(--gold);margin-bottom:12px;letter-spacing:0.3px;';
  title.textContent = '✅ Изберете следващите стъпки:';
  wrap.appendChild(title);

  if(items.length > 3){
    const hint = document.createElement('div');
    hint.style.cssText = 'font-size:10px;color:var(--muted);margin-bottom:8px;text-align:center;';
    hint.textContent = '👇 Превъртете надолу за всички опции';
    wrap.appendChild(hint);
  }

  const grid = document.createElement('div');
  const isMobile = window.innerWidth <= 600;
  grid.style.cssText = `display:grid;grid-template-columns:${isMobile ? '1fr' : '1fr 1fr'};gap:8px;margin-bottom:14px;`;

  const checked = {};
  const prevChecked = ctx._lastGridChecked || [];
  // Per-cell area tracking — всяка клетка има своя квадратура
  const cellAreas = {};

  items.forEach(it => {
    cellAreas[it.id] = (ctx._lastCellAreas && ctx._lastCellAreas[it.id]) || knownArea || null;
    if(it.locked) checked[it.id] = true;
    if(prevChecked.includes(it.id)) checked[it.id] = true;
    const isChecked = it.checked || it.locked;
    const initArea = knownArea || null;

    const cell = document.createElement('div');
    cell.dataset.id = it.id;
    cell.dataset.serviceLabel = it.serviceName + (it.serviceType ? ` (${it.serviceType})` : '');
    cell.style.cssText = `
      background:${isChecked ? 'rgba(76,175,130,0.08)' : 'var(--bg-btn)'};
      border:2px solid ${isChecked ? 'rgba(76,175,130,0.6)' : 'rgba(201,168,76,0.22)'};
      border-radius:12px;padding:12px 12px 10px;
      cursor:${it.locked ? 'default' : 'pointer'};
      display:flex;flex-direction:column;gap:0;
      transition:background .15s,border-color .15s;
    `;

    // Горен ред: checkbox + текст + дясна колона
    const topRow = document.createElement('div');
    topRow.style.cssText = 'display:flex;align-items:flex-start;gap:10px;';

    const chkBox = document.createElement('div');
    chkBox.className = 'sg-chk';
    chkBox.style.cssText = `
      width:22px;height:22px;border-radius:5px;flex-shrink:0;margin-top:2px;
      border:2px solid ${isChecked ? 'var(--green)' : 'rgba(201,168,76,0.45)'};
      background:${isChecked ? 'var(--green)' : 'transparent'};
      display:flex;align-items:center;justify-content:center;
      font-size:13px;font-weight:700;color:#fff;transition:all .15s;
    `;
    chkBox.textContent = it.locked ? '🔒' : (isChecked ? '✓' : '');

    const textBlock = document.createElement('div');
    textBlock.style.cssText = 'flex:1;min-width:0;';
    const lbl = document.createElement('div');
    lbl.style.cssText = 'font-size:16px;font-weight:700;color:var(--text);line-height:1.3;';
    lbl.textContent = it.label;
    const priceDiv = document.createElement('div');
    priceDiv.style.cssText = 'font-size:13px;color:rgba(201,168,76,0.8);margin-top:3px;font-weight:600;';
    priceDiv.textContent = it.price ? `${eur(it.price)} € / ${it.price} лв/м²` : '🎨 избор на цвят';
    const totalDiv = document.createElement('div');
    totalDiv.style.cssText = 'font-size:13px;font-weight:700;color:var(--gold);margin-top:4px;';
    totalDiv.textContent = (it.price && initArea) ? `${(it.price * initArea).toFixed(2)} лв` : '';
    if(it.desc){
      const descDiv = document.createElement('div');
      descDiv.style.cssText = 'font-size:11px;color:var(--muted);margin-top:3px;line-height:1.4;';
      descDiv.textContent = it.desc;
      textBlock.appendChild(lbl); textBlock.appendChild(descDiv); textBlock.appendChild(priceDiv); textBlock.appendChild(totalDiv);
    } else {
      textBlock.appendChild(lbl); textBlock.appendChild(priceDiv); textBlock.appendChild(totalDiv);
    }

    const rightCol = document.createElement('div');
    rightCol.style.cssText = 'text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:3px;';
    const qtyVal = document.createElement('div');
    qtyVal.style.cssText = 'font-size:15px;font-weight:700;color:var(--gold);';
    qtyVal.textContent = initArea ? `${initArea} м²` : '';
    const editHint = document.createElement('div');
    editHint.style.cssText = 'font-size:10px;color:rgba(201,168,76,0.5);cursor:pointer;user-select:none;';
    editHint.textContent = '✏️ промени м²';
    rightCol.appendChild(qtyVal); rightCol.appendChild(editHint);

    topRow.appendChild(chkBox); topRow.appendChild(textBlock); topRow.appendChild(rightCol);
    cell.appendChild(topRow);

    // Per-cell inline input — скрит по подразбиране, само за тази клетка
    const cellInput = document.createElement('input');
    cellInput.type = 'number'; cellInput.min = '1'; cellInput.placeholder = 'Нова квадратура (м²)';
    if(initArea) cellInput.value = initArea;
    cellInput.style.cssText = 'display:none;width:100%;background:var(--bg-btn);border:1px solid var(--gold);border-radius:8px;padding:8px 10px;color:var(--text);font-size:14px;outline:none;margin-top:8px;box-sizing:border-box;';
    cell.appendChild(cellInput);

    // ✏️ клик — показва само тази клетка, затваря останалите
    editHint.addEventListener('click', (e) => {
      e.stopPropagation();
      const isOpen = cellInput.style.display !== 'none';
      grid.querySelectorAll('input[type=number]').forEach(inp => { inp.style.display = 'none'; });
      if(!isOpen){ cellInput.style.display = 'block'; setTimeout(() => cellInput.focus(), 50); }
    });
    cellInput.addEventListener('click', (e) => e.stopPropagation());

    // 3: Enter потвърждава квадратурата и затваря полето
    cellInput.addEventListener('keydown', (e) => {
      if(e.key === 'Enter'){
        e.stopPropagation();
        cellInput.style.display = 'none';
        cellInput.blur();
      }
    });

    // Промяна на квадратура — само тази клетка + обновява панела ако е чекната
    cellInput.addEventListener('input', () => {
      const v = parseFloat(cellInput.value);
      if(v > 0){
        cellAreas[it.id] = v;
        ctx._lastCellAreas = Object.assign({}, cellAreas);
        qtyVal.textContent = `${v} м²`;
        if(it.price) totalDiv.textContent = `${(it.price * v).toFixed(2)} лв`;
        if(checked[it.id] && !it.isPaintMenu){
          const itemLabel = it.serviceName + (it.serviceType ? ` (${it.serviceType})` : '');
          const panelItem = panelItems.find(p => p.label === itemLabel);
          if(panelItem){ panelItem.qty = v; panelItem.total = Math.round(v * it.price * 100) / 100; renderPanel(); }
        }
      }
    });

    grid.appendChild(cell);

    if(!it.locked){
      cell.addEventListener('click', () => {
        if(checked[it.id]){
          delete checked[it.id];
          cell.style.background = 'var(--bg-btn)';
          cell.style.borderColor = 'rgba(201,168,76,0.22)';
          chkBox.textContent = ''; chkBox.style.background = 'transparent'; chkBox.style.borderColor = 'rgba(201,168,76,0.45)';
          lbl.style.textDecoration = '';
          panelItems = panelItems.filter(p => {
            const itemLabel = it.serviceName + (it.serviceType ? ` (${it.serviceType})` : '');
            return p.label !== itemLabel;
          });
          renderPanel();
        } else {
          const useArea = cellAreas[it.id] || knownArea;
          if(!useArea || useArea <= 0){
            // Няма квадратура — отваря input на тази клетка
            cellInput.style.display = 'block'; setTimeout(() => cellInput.focus(), 50);
            return;
          }
          checked[it.id] = true;
          cell.style.background = 'rgba(76,175,130,0.08)'; cell.style.borderColor = 'rgba(76,175,130,0.6)';
          chkBox.textContent = '✓'; chkBox.style.background = 'var(--green)'; chkBox.style.borderColor = 'var(--green)';
          if(!it.isPaintMenu){
            const itemLabel = it.serviceName + (it.serviceType ? ` (${it.serviceType})` : '');
            addToPanel(itemLabel, useArea, 'м²', it.price);
            ctx.prevValue = useArea; ctx.prevUnit = 'м²'; ctx.queueArea = useArea;
          }
        }
        const hasSel = Object.keys(checked).length > 0;
        if(hasSel){
          selHint.style.display = 'none'; doneBtn.style.display = 'block';
          setTimeout(() => { doneBtn.style.opacity = '1'; doneBtn.style.transform = 'translateY(0)'; }, 10);
        } else {
          selHint.style.display = 'block';
          doneBtn.style.opacity = '0'; doneBtn.style.transform = 'translateY(6px)';
          setTimeout(() => { doneBtn.style.display = 'none'; }, 250);
        }
      });
    }
  });
  wrap.appendChild(grid);

  const selHint = document.createElement('div');
  selHint.style.cssText = 'font-size:12px;color:rgba(255,255,255,0.25);text-align:center;padding:8px 0 4px;';
  selHint.textContent = '👆 Изберете услуга за да продължите';
  wrap.appendChild(selHint);

  const doneBtn = document.createElement('button');
  doneBtn.className = 'cb-confirm';
  doneBtn.textContent = '✅ Добави избраните';
  doneBtn.style.cssText = 'margin-top:4px;font-size:15px;padding:14px;width:100%;display:none;opacity:0;transform:translateY(6px);transition:opacity .25s,transform .25s;';
  doneBtn.addEventListener('click', () => {
    const sel = items.filter(it => checked[it.id]);
    ctx._lastGridChecked = Object.keys(checked);
    ctx._lastGridArea = knownArea;
    clearCho(); elInputRow.style.display = 'flex';
    const paintItem = sel.find(it => it.isPaintMenu);
    ctx._paintAfterQueue = !!paintItem;
    if(paintItem){
      const paintArea = cellAreas[paintItem.id] || knownArea;
      ctx.queueArea = paintArea; ctx.prevValue = paintArea; ctx.prevUnit = 'м²';
      ctx.usesPrevArea = true;
    }
    if(paintItem && sel.filter(it=>!it.isPaintMenu).length === 0){
      setTimeout(() => go('painting_menu'), 380); return;
    }
    if(paintItem) setTimeout(() => go('painting_menu'), 380);
    else setTimeout(() => showOfferOverlay(), 380);
  });
  wrap.appendChild(doneBtn);

  // Бутони долу — само 2 ясни опции
  const btnsRow = document.createElement('div');
  btnsRow.style.cssText = 'display:flex;gap:8px;margin-top:8px;';

  const offerBtn = document.createElement('button');
  offerBtn.className = 'cb-skip';
  offerBtn.textContent = '📋 Виж офертата';
  offerBtn.style.cssText = 'flex:1;font-weight:600;color:var(--gold);border-color:rgba(201,168,76,0.3);font-size:14px;padding:11px;border-radius:10px;background:transparent;border:1px solid rgba(201,168,76,0.3);cursor:pointer;';
  offerBtn.addEventListener('click', () => { clearCho(); elInputRow.style.display = 'flex'; setTimeout(() => showOfferOverlay(), 200); });

  const otherBtn = document.createElement('button');
  otherBtn.className = 'cb-skip';
  otherBtn.textContent = '➕ Друга услуга';
  otherBtn.style.cssText = 'flex:1;font-size:14px;padding:11px;border-radius:10px;background:transparent;border:1px solid var(--border-bubble);color:var(--muted);cursor:pointer;';
  otherBtn.addEventListener('click', () => {
    clearCho(); elInputRow.style.display = 'flex';
    setTimeout(() => {
      elMsgs.innerHTML = ''; hist = []; cur = 'start';
      elBack.classList.remove('on'); elMsgs.scrollTop = 0;
      go('start');
    }, 200);
  });

  btnsRow.appendChild(offerBtn);
  btnsRow.appendChild(otherBtn);
  wrap.appendChild(btnsRow);
  elMsgs.appendChild(wrap);
  choEl = wrap;
  if(onReady) onReady();
}

let _pkgSheetOnBack = null;

function closePackageSheet(){
  const sheet = document.getElementById('pkg-sheet');
  const backdrop = document.getElementById('pkg-sheet-backdrop');
  if(sheet) sheet.style.transform = 'translateY(100%)';
  if(backdrop){ backdrop.style.opacity = '0'; backdrop.style.pointerEvents = 'none'; setTimeout(() => { backdrop.style.display = 'none'; }, 300); }
}

function renderPackages(packages, area){
  clearCho(); setInp(false,''); elInputRow.style.display = 'none';

  const sheet = document.getElementById('pkg-sheet');
  const backdrop = document.getElementById('pkg-sheet-backdrop');
  const body = document.getElementById('pkg-sheet-body');
  const titleEl = document.getElementById('pkg-sheet-title');

  if(!sheet || !body) return;

  titleEl.textContent = `ПАКЕТИ · ${area} М² · САМО ЗА ТРУД`;
  body.innerHTML = '';

  const discounts = [0, 0.05, 0.10];
  const popularLabels = ['', '⭐ препоръчан · 87% избират това', '💎 най-изгоден'];

  const selectedServiceName = ctx.serviceType || ctx.serviceName || '';
  const greenBanner = document.createElement('div');
  greenBanner.className = 'pkg-green-banner';
  // Махаме стари банери
  body.parentNode.querySelectorAll('.pkg-green-banner').forEach(b => b.remove());
  greenBanner.style.cssText = 'background:rgba(76,175,130,0.08);border-bottom:1px solid rgba(76,175,130,0.2);padding:10px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0;';
  greenBanner.innerHTML = `<div style="width:20px;height:20px;border-radius:50%;background:#4CAF82;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:700;flex-shrink:0;">✓</div><div style="font-size:13px;color:#4CAF82;font-weight:600;">Всички пакети включват: <strong>${selectedServiceName}</strong></div>`;
  body.parentNode.insertBefore(greenBanner, body);

  packages.forEach((pkg, idx) => {
    const discount = discounts[idx] || 0;
    const totalLvFull = pkg.items.reduce((s,it) => s + it.price * area, 0);
    const baseNames = idx === 0 ? [] : packages[0].items.map(i => i.name);
    const extraLv = pkg.items.filter(it => !baseNames.includes(it.name)).reduce((s,it) => s + it.price * area, 0);
    const discountAmount = Math.round(extraLv * discount * 100) / 100;
    const totalLv = Math.round((totalLvFull - discountAmount) * 100) / 100;
    const totalEurFull = eur(totalLvFull);
    const totalEurDisc = eur(totalLv);
    const savedEur = eur(discountAmount);
    const hasDiscount = discount > 0 && discountAmount > 0;
    const isRec = idx === 1;
    const isBest = idx === 2;

    const wrapper = document.createElement('div');
    wrapper.style.cssText = 'position:relative;padding-top:12px;';

    const pkgBadge = document.createElement('div');
    const badgeColors = ['rgba(255,255,255,0.15)', 'rgba(201,168,76,0.6)', 'rgba(76,175,130,0.6)'];
    const badgeTextColors = ['#aaa', '#C9A84C', '#4CAF82'];
    pkgBadge.style.cssText = `position:absolute;top:0;left:14px;background:#1A1A1C;border:1px solid ${badgeColors[idx]};border-radius:20px;padding:2px 12px;font-size:10px;font-weight:700;color:${badgeTextColors[idx]};letter-spacing:0.5px;z-index:1;white-space:nowrap;`;
    pkgBadge.textContent = idx === 0 ? 'ПАКЕТ 1' : idx === 1 ? 'ПАКЕТ 2 · ПРЕПОРЪЧАН' : 'ПАКЕТ 3 · НАЙ-ИЗГОДЕН';
    wrapper.appendChild(pkgBadge);

    const card = document.createElement('div');
    card.className = `pkg-card${isRec ? ' rec' : isBest ? ' best' : ''}`;

    const priceColor = isBest ? '#4CAF82' : '#C9A84C';
    const badgeColor = isBest ? '#4CAF82' : '#C9A84C';
    const btnBg = isBest ? 'linear-gradient(135deg,#4CAF82,#2d8a5e)' : isRec ? 'linear-gradient(135deg,#C9A84C,#9A7530)' : '#333';
    const btnColor = isBest || isRec ? '#0E0E0F' : '#F0EDE6';

    card.innerHTML = `
      <div class="pkg-card-head">
        <div>
          <div class="pkg-card-name">${pkg.tier} ${pkg.label}</div>
          ${popularLabels[idx] ? `<div class="pkg-card-badge" style="color:${badgeColor};">${popularLabels[idx]}</div>` : ''}
        </div>
        <div style="text-align:right;">
          ${hasDiscount ? `<div style="font-size:11px;color:#888;text-decoration:line-through;">${totalEurFull} €</div>` : ''}
          <div style="font-size:22px;font-weight:700;color:${priceColor};">${totalEurDisc} €</div>
          <div style="font-size:10px;color:#888;">${totalLv.toFixed(2)} лв</div>
          ${hasDiscount ? `<div style="font-size:11px;color:#4CAF82;font-weight:700;">Спестявате ${savedEur} €</div>` : ''}
        </div>
      </div>
      <div class="pkg-card-items">
        ${pkg.items.map(it => {
          const isSelected = selectedServiceName && (it.name.includes(selectedServiceName) || selectedServiceName.includes(it.name));
          if(isSelected) return `<div class="pkg-card-item" style="background:rgba(76,175,130,0.1);border:1px solid rgba(76,175,130,0.3);border-radius:8px;padding:5px 8px;"><span style="color:#4CAF82;font-weight:700;">✓ ${it.name}</span><span style="color:#4CAF82;font-weight:700;font-size:11px;">← Избрахте това</span></div>`;
          return `<div class="pkg-card-item"><span>✓ ${it.name}</span><span>${eur(it.price * area)} €</span></div>`;
        }).join('')}
      </div>
      ${hasDiscount ? `<div style="font-size:11px;color:${badgeColor};font-weight:700;margin-bottom:6px;">-${discount*100}% отстъпка върху допълнителните услуги</div>` : ''}
      ${idx === 0 && pkg.label === 'Само боядисване' ? '<div style="font-size:11px;color:#E05555;margin-bottom:6px;">⚠️ Без грунд — препоръчваме върху вече грундирана повърхност</div>' : ''}
      <div class="pkg-card-footer">За ${area} м² · само за труд</div>
      <button class="pkg-card-btn" style="background:${btnBg};color:${btnColor};">Избери този пакет</button>
    `;

    card.querySelector('.pkg-card-btn').addEventListener('click', (e) => {
      // Е8: деактивираме бутона веднага за да предотвратим двойно натискане
      const btn = e.currentTarget;
      if(btn.disabled) return;
      btn.disabled = true;
      setTimeout(() => { btn.disabled = false; }, 1500);

      // Визуален feedback
      card.style.transform = 'scale(0.97)';
      setTimeout(() => { card.style.transform = ''; }, 150);

      setTimeout(() => {
        closePackageSheet();
        elInputRow.style.display = 'flex';
        addBubble(`${pkg.tier} ${pkg.label} · ${area} м²`, 'user', false);
        pkg.items.forEach(it => {
          const isExtra = idx > 0 && !packages[0].items.map(i=>i.name).includes(it.name);
          const discountedPrice = isExtra ? Math.round(it.price * (1 - discount) * 100) / 100 : it.price;
          const itemTotal = Math.round(discountedPrice * area * 100) / 100;
          if(!panelItems.some(p => p.label === it.name && p.unit === 'м²')){
            panelItems.push({ id: ++idSeq, label: it.name, qty: area, unit: 'м²', price: discountedPrice, total: itemTotal });
          }
        });
        renderPanel();
        ctx.prevValue = area; ctx.prevUnit = 'м²';
        showFlashConfirm(`${pkg.label} — ${totalEurDisc} €`);
        setTimeout(() => showOfferOverlay(), 700);
      }, 200);
    });

    wrapper.appendChild(card);
    body.appendChild(wrapper);
  });

  // Бяло/Премиум бутон ако има боядисване
  const hasPainting = packages.some(p => p.items.some(it => it.name.includes('Боядисване')));
  if(hasPainting){
    const altBtn = document.createElement('button');
    altBtn.className = 'cb-skip';
    altBtn.textContent = '🎨 Искате бяло или премиум вместо?';
    altBtn.style.cssText = 'margin-top:8px;font-size:13px;color:var(--muted);width:100%;';
    altBtn.addEventListener('click', () => {
      closePackageSheet();
      elInputRow.style.display = 'flex';
      addBubble('🎨 Избор на вид боядисване:', 'bot');
      setTimeout(() => renderCho([
        {label:'Един цвят – Бяло', desc:'4.20 €/м²', next:'painting_area', price:P.paint_white, serviceType:'Един цвят – Бяло', serviceName:'Боядисване', displayUnit:'м²'},
        {label:'Премиум покритие', desc:'6.80 €/м²', next:'painting_area', price:P.paint_premium, serviceType:'Премиум', serviceName:'Боядисване', displayUnit:'м²'},
        {label:'⬅ Назад към пакетите', next:null, specialBack:true}
      ]), 300);
    });
    body.appendChild(altBtn);
  }

  // Назад бутон
  const backBtn = document.getElementById('pkg-sheet-back-btn');
  if(backBtn){
    backBtn.onclick = () => {
      closePackageSheet();
      elInputRow.style.display = 'flex';
      setTimeout(() => goBack(), 200);
    };
  }

  // Backdrop затваря sheet
  if(backdrop){
    backdrop.onclick = () => {
      closePackageSheet();
      elInputRow.style.display = 'flex';
      setTimeout(() => go('start'), 200);
    };
  }

  // Отваряме sheet
  sheet.style.transition = 'none';
  sheet.style.transform = 'translateY(100%)';
  if(backdrop){ backdrop.style.display = 'block'; backdrop.style.opacity = '0'; }
  setTimeout(() => {
    const sheetBody = document.getElementById('pkg-sheet-body');
    if(sheetBody) sheetBody.scrollTop = 0;
    sheet.style.transition = 'transform .35s cubic-bezier(.4,0,.2,1)';
    sheet.style.transform = 'translateY(0)';
    if(backdrop){ backdrop.style.opacity = '1'; backdrop.style.pointerEvents = 'all'; }
    if(navigator.vibrate) navigator.vibrate(10);
  }, 30);

  // НЕ задаваме choEl = sheet — clearCho ще го изтрие от DOM
  // Sheet-ът се управлява самостоятелно
}

function processGridQueue(){
  if(!cbQueue.length){
    if(ctx._paintAfterQueue){ ctx._paintAfterQueue = false; setTimeout(() => go('painting_menu'), 380); }
    else setTimeout(() => go('offer_summary'), 380);
    return;
  }
  const item = cbQueue.shift();
  const area = ctx.queueArea || ctx.prevValue;
  const label = item.serviceName + (item.serviceType ? ` (${item.serviceType})` : '');
  addToPanel(label, area, 'м²', item.price);
  ctx.lastService = item.saveKey;
  ctx.prevValue = area; ctx.prevUnit = 'м²';
  skipScrollFor(400);
  showTyping();
  setTimeout(() => {
    hideTyping();
    setTimeout(processGridQueue, 250);
  }, 200);
}
