// ======================== БУТОНИ И СЛУШАТЕЛИ ========================
elToggle.addEventListener('click', () => {
  const open = elWidget.classList.toggle('open');
  elToggle.classList.toggle('open', open);
  if (open) tbTrack('bot_opened');
  if (!open) {
    // Фикс #B: при toggle-затваряне — изчистваме botStep записите
    const stepsToRemove = hist.length + 1;
    if (stepsToRemove > 0) {
      _backFromHistory = true; // блокираме popstate да не вика goBack()
      try { history.go(-stepsToRemove); } catch(e) {}
      setTimeout(() => { _backFromHistory = false; }, 600);
    }
  }
  if(open && elMsgs.children.length === 0){
    const seen = sessionStorage.getItem('terybot_seen');
    setTimeout(() => go(seen ? 'start' : 'before_we_start'), 270);
    if(!seen) sessionStorage.setItem('terybot_seen','1');
  }
});
elBack.addEventListener('click', goBack);
document.getElementById('tb-close').addEventListener('click', () => {
  // Фикс #A: изчистваме botStep записите от history преди затваряне
  const stepsToRemove = hist.length + 1; // +1 за текущата стъпка
  elWidget.classList.remove('open');
  elToggle.classList.remove('open');
  if (stepsToRemove > 0) {
    _backFromHistory = true; // блокираме popstate да не вика goBack()
    try { history.go(-stepsToRemove); } catch(e) {}
    setTimeout(() => { _backFromHistory = false; }, 600);
  }
});

// BROWSER BACK BUTTON — физическото "Назад" връща 1 стъпка в бота
window.addEventListener('popstate', function(e) {
  // Реагираме само ако ботът е отворен
  if (!elWidget.classList.contains('open')) return;
  // Игнорираме ако event-ът е от сайта (service modal, lightbox и т.н.)
  if (e.state && e.state.modal !== undefined && e.state.botStep === undefined) return;
  _backFromHistory = true;
  if (hist.length > 0) {
    clearCho();
    goBack();
  } else {
    // Ботът е на началото → затваряме го, но оставаме на сайта
    elWidget.classList.remove('open');
    elToggle.classList.remove('open');
    // Поправка: добавяме запис за да не излезем от сайта при следващ "Назад"
    try { history.pushState(null, ''); } catch(e) {}
  }
  setTimeout(function() { _backFromHistory = false; }, 100);
});

function applyViewport(){
  if(!elWidget.classList.contains('open')) return;
  const vv = window.visualViewport;
  if(!vv || window.innerWidth > 600) return;
  // Намаляме msgs зоната динамично — единственият надежден начин в Chrome
  const totalH = window.innerHeight;
  const visibleH = vv.height;
  const keyboardH = totalH - visibleH;
  const inputRowH = elInputRow.offsetHeight || 56;
  if(keyboardH > 100){
    // Клавиатурата е отворена — задаваме точна височина на msgs
    const msgsH = visibleH - inputRowH - (document.querySelector('.tb-header').offsetHeight||52) - (document.getElementById('tb-bottom-bar').offsetHeight||0) - 8;
    elMsgs.style.maxHeight = msgsH + 'px';
    elMsgs.style.height = msgsH + 'px';
    requestAnimationFrame(() => { elMsgs.scrollTop = elMsgs.scrollHeight; });
  }
}
function resetViewport(){
  if(window.innerWidth <= 600){
    elMsgs.style.maxHeight = '';
    elMsgs.style.height = '';
  }
}
if(window.visualViewport){
  window.visualViewport.addEventListener('resize', () => {
    const vv = window.visualViewport;
    if(vv.height < window.innerHeight * 0.8){ applyViewport(); }
    else { resetViewport(); }
  });
}

// tbGoState — позволява на сайта да отвори бота директно на конкретно меню
// Inline reset БЕЗ scheduled go('start') — директна навигация (елиминира 250ms flash)
window.tbGoState = function(state) {
  ctx = {}; offer = []; hist = []; cur = state; cbQueue = [];
  ctx._queueAwaitingArea = false;
  ctx.queueArea = null;
  ctx.usesPrevArea = false;
  ctx._gridQueuePending = false;
  ctx._paintAfterQueue = false;
  idSeq = 0;
  clearPanel(); clearCho(); setInp(false, '');
  elMsgs.innerHTML = '';
  elActionBtns.style.display = 'none';
  elInputRow.style.display = 'flex';
  elBack.classList.remove('on');
  elMsgs.scrollTop = 0;
  // Фикс #C: go() ще ползва replaceState вместо pushState за да не остава "празен" modal запис
  _replaceNextHistory = true;
  setTimeout(() => go(state), 100);
};
