<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ремонти София - Траян Иванов | 50 €</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
  <style>
    :root { --navy: #0d1b2e; --gold: #c9943a; --viber: #7360f2; --cream: #f4f0e8; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: var(--cream); color: #333; }
    
    /* Buttons */
    .float-btn { position: fixed; right: 20px; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 1000; text-decoration: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    .btn-viber { bottom: 90px; background: var(--viber); }
    .btn-call { bottom: 20px; background: var(--gold); }

    /* Hero */
    .hero { background: var(--navy); color: white; padding: 100px 20px; text-align: center; }
    .hero h1 { font-size: 2.5rem; margin-bottom: 10px; }
    .hero p { font-size: 1.2rem; color: #aab; }

    /* Sections */
    section { padding: 50px 20px; max-width: 1200px; margin: 0 auto; text-align: center; }
    .video-card { background: #000; border-radius: 12px; overflow: hidden; border: 2px solid var(--gold); }
    .video-container { position: relative; padding-bottom: 56.25%; height: 0; }
    .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

    /* Gallery */
    .swiper { width: 100%; height: 400px; margin: 20px 0; }
    .swiper-slide img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
    
    .price-tag { font-size: 1.5rem; font-weight: bold; color: var(--gold); margin: 20px 0; }
  </style>
</head>
<body>

<a href="viber://chat?number=%2B359877810418" class="float-btn btn-viber">💬</a>
<a href="tel:0877810418" class="float-btn btn-call">📞</a>

<div class="hero">
  <h1>Ти Почиваш - Ние Ремонтираме!</h1>
  <p>Професионално изпълнение в София</p>
  <div class="price-tag">Оглед и Оферта: 50 €</div>
</div>

<section id="videos">
  <h2>Техника в действие</h2>
  <div class="swiper mySwiper">
    <div class="swiper-wrapper">
      <div class="swiper-slide">
        <div class="video-card">
          <div class="video-container">
            <iframe src="https://www.youtube.com/embed/Wp8iLS5HqPM?autoplay=1&mute=1&rel=0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<section id="gallery">
  <h2>Галерия обекти</h2>
  <div class="swiper gallerySwiper">
    <div class="swiper-wrapper">
      <div class="swiper-slide"><img src="IMG_20230322_134120.jpg"></div>
      <div class="swiper-slide"><img src="IMG_20260325_170739.jpg"></div>
      <div class="swiper-slide"><img src="IMG_20240724_172122.jpg"></div>
    </div>
    <div class="swiper-pagination"></div>
    <div class="swiper-button-next"></div>
    <div class="swiper-button-prev"></div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
  new Swiper(".gallerySwiper", {
    loop: true,
    navigation: { nextEl: ".swiper-button-next", prevEl: ".swiper-button-prev" },
    pagination: { el: ".swiper-pagination", clickable: true },
    autoplay: { delay: 3000 }
  });
</script>

</body>
</html>
