<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ти Почиваш – Ние Ремонтираме | Професионални Ремонти София</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0d1b2e; --navy2: #162540; --navy3: #1c2e48;
      --gold: #c9943a; --gold2: #e8b84b; --cream: #f4f0e8;
      --white: #ffffff; --text: #1a2535; --muted: #8a9ab0;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Jost', sans-serif; background: var(--cream); color: var(--text); line-height: 1.6; }

    /* ПЛАВАЩИ БУТОНИ */
    .floating-btns { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 12px; z-index: 1000; }
    .float-btn { width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; color: white; font-size: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
    .btn-call { background: linear-gradient(135deg, var(--gold), var(--gold2)); color: var(--navy); animation: pulse 2s infinite; }
    .btn-wa { background-color: #25D366; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(201,148,58,0.7); } 70% { box-shadow: 0 0 0 15px rgba(201,148,58,0); } 100% { box-shadow: 0 0 0 0 rgba(201,148,58,0); } }

    /* NAVIGATION */
    nav { position: fixed; top: 0; width: 100%; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 1rem 5%; background: rgba(13,27,46,.98); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(201,148,58,.2); }
    .logo { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; color: var(--gold); font-weight: 600; }
    .logo span { display: block; font-size: .6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; font-family: 'Jost'; }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { color: #c8d6e8; text-decoration: none; font-size: .75rem; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
    .nav-links a:hover { color: var(--gold); }

    /* HERO SECTION */
    .hero { min-height: 100vh; background: linear-gradient(160deg, #080f1a 0%, var(--navy) 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 120px 5% 60px; text-align: center; }
    .hero-badge { border: 1px solid rgba(201,148,58,.4); border-radius: 30px; padding: .5rem 1.5rem; color: var(--gold2); font-size: .7rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 2rem; }
    .hero h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.5rem, 8vw, 5.5rem); color: white; line-height: 1.1; margin-bottom: 1.5rem; }
    .hero h1 .accent { color: var(--gold); display: block; }
    .hero-sub { color: #7a90a8; max-width: 700px; margin: 0 auto 2.5rem; font-size: 1rem; }
    .btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold2)); color: var(--navy); padding: 1.2rem 3rem; border-radius: 3px; text-decoration: none; font-weight: 700; text-transform: uppercase; display: inline-block; box-shadow: 0 10px 30px rgba(201,148,58,0.3); transition: 0.3s; }

    /* SECTIONS */
    section { padding: 8rem 10%; }
    .section-tag { display: block; font-size: .7rem; color: var(--gold); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 1rem; text-align: center; }
    .section-h2 { font-family: 'Cormorant Garamond', serif; font-size: 3rem; text-align: center; margin-bottom: 1.5rem; color: var(--navy); }
    .gold-line { width: 60px; height: 2px; background: var(--gold); margin: 0 auto 3rem; }

    /* ADVISOR SECTION */
    .advisor { background: white; }
    .advisor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center; }
    .advisor-box { background: var(--cream); padding: 2.5rem; border-radius: 4px; border-left: 5px solid var(--gold); }
    .advisor-box h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; margin-bottom: 1.5rem; }
