<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<title>ivanov-remonti — Калкулатор + Админ панел</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial, sans-serif; margin: 0; padding: 0; }

/* Основно съдържание */
.main-content {
    padding: 40px 20px;
    max-width: 900px;
    margin: 0 auto;
}

/* Плаващ бутон */
#calc-btn {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 70px;
    height: 70px;
    background: #222;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
    z-index: 9999;
}
#calc-btn img { width: 40px; height: 40px; }

/* Панел на калкулатора */
#calc-panel {
    position: fixed;
    bottom: 120px;
    right: 30px;
    width: 320px;
    background: #fff;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 0 25px rgba(0,0,0,0.25);
    display: none;
    z-index: 9999;
}
#calc-panel.open { display: block; }

#calc-panel input,
#calc-panel textarea {
    width: 100%;
    padding: 10px;
    margin-bottom: 12px;
    border: 1px solid #ccc;
    border-radius: 6px;
}
#calc-panel button {
    width: 100%;
    padding: 12px;
    background: #222;
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

/* Админ панел */
#admin-panel {
    display: none;
    padding: 40px;
}
#admin-panel.active { display: block; }

table { width: 100%; border-collapse: collapse; margin-top: 20px; }
td, th { border: 1px solid #ccc; padding: 10px; }
th { background: #f5f5f5; }
button.del {
    padding: 6px 12px;
    background: red;
    color: #fff;
    border: none;
    cursor: pointer;
}
</style>
</head>
<body>

<!-- Основен сайт -->
<div class="main-content" id="site">
    <h1>ivanov-remonti.com</h1>
    <p>Премиум довършителни ремонти. Калкулаторът е долу вдясно.</p>
    <p>Админ панел → добави #admin в URL</p>
</div>

<!-- Плаващ бутон -->
<div id="calc-btn">
    <img src="calculator-icon.png" alt="calc">
</div>

<!-- Панел на калкулатора -->
<div id="calc-panel">
    <h3>Калкулатор за оферта</h3>

    <input id="c-name" type="text" placeholder="Вашето име">
    <input id="c-phone" type="text" placeholder="Телефон">
    <textarea id="c-desc" placeholder="Опишете накратко ремонта"></textarea>

    <button id="c-send">Изпрати</button>
</div>

<!-- Админ панел -->
<div id="admin-panel">
    <h2>Админ панел — заявки от калкулатора</h2>

    <table>
        <thead>
            <tr>
                <th>Име</th>
                <th>Телефон</th>
                <th>Описание</th>
                <th>Дата</th>
                <th>Действие</th>
            </tr>
        </thead>
        <tbody id="offers"></tbody>
    </table>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
// ТВОЯТА FIREBASE КОНФИГУРАЦИЯ
const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_DOMAIN",
    projectId: "YOUR_PROJECT",
    storageBucket: "YOUR_BUCKET",
    messagingSenderId: "YOUR_SENDER",
    appId: "YOUR_APP_ID"
};
firebase.initializeApp(firebaseConfig);

// Показване на админ панела при #admin
if (location.hash === "#admin") {
    document.getElementById("site").style.display = "none";
    document.getElementById("calc-btn").style.display = "none";
    document.getElementById("calc-panel").style.display = "none";
    document.getElementById("admin-panel").classList.add("active");
}

// Отваряне/затваряне на калкулатора
document.getElementById("calc-btn").onclick = () => {
    document.getElementById("calc-panel").classList.toggle("open");
};

// Изпращане на заявка
document.getElementById("c-send").onclick = async () => {
    const name = document.getElementById("c-name").value.trim();
    const phone = document.getElementById("c-phone").value.trim();
    const desc = document.getElementById("c-desc").value.trim();

    if (!name || !phone || !desc) {
        alert("Моля, попълнете всички полета.");
        return;
    }

    await firebase.firestore().collection("offers").add({
        name,
        phone,
        desc,
        date: new Date().toISOString()
    });

    alert("Заявката е изпратена успешно!");
    document.getElementById("calc-panel").classList.remove("open");
};

// Админ панел — зареждане на заявки
function esc(str) {
    return str.replace(/[&<>"']/g, m => ({
        "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;"
    }[m]));
}

firebase.firestore().collection("offers").orderBy("date", "desc").onSnapshot(snapshot => {
    const table = document.getElementById("offers");
    table.innerHTML = "";

    snapshot.forEach(doc => {
        const d = doc.data();
        const date = new Date(d.date).toLocaleString("bg-BG");

        table.innerHTML += `
            <tr>
                <td>${esc(d.name)}</td>
                <td>${esc(d.phone)}</td>
                <td>${esc(d.desc)}</td>
                <td>${date}</td>
                <td><button class="del" onclick="del('${doc.id}')">X</button></td>
            </tr>
        `;
    });
});

function del(id) {
    if (confirm("Сигурни ли сте?")) {
        firebase.firestore().collection("offers").doc(id).delete();
    }
}
</script>

</body>
</html>
